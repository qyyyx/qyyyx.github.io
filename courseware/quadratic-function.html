<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>二次函数 · 数学实验室</title>
    <link rel="stylesheet" href="vendor/jsxgraph/jsxgraph.css">
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="lab-shell">
      <!-- === 左侧导航 === -->
      <aside class="lab-nav" aria-label="模块导航">
        <div class="brand-block">
          <p class="brand-kicker">Math Lab</p>
          <h1>二次函数</h1>
        </div>
        <nav class="module-list">
          <p class="module-section-label">探究模块</p>
          <button class="module-item active" type="button" data-module="a-magic">
            <span class="module-index">01</span>
            <span>系数 a 的魔法</span>
          </button>
          <button class="module-item" type="button" data-module="vertex-move">
            <span class="module-index">02</span>
            <span>顶点去哪儿了</span>
          </button>
          <button class="module-item" type="button" data-module="symmetry">
            <span class="module-index">03</span>
            <span>对称轴的秘密</span>
          </button>
          <button class="module-item" type="button" data-module="monotonicity">
            <span class="module-index">04</span>
            <span>增减性观察台</span>
          </button>
          <button class="module-item" type="button" data-module="challenge">
            <span class="module-index">05</span>
            <span>挑战关卡：猜函数</span>
          </button>
          <div class="module-divider"></div>
          <p class="module-section-label">拓展</p>
          <button class="module-item" type="button" data-module="life">
            <span class="module-index">06</span>
            <span>抛物线在身边</span>
          </button>
        </nav>
      </aside>

      <!-- === 中间工作区 === -->
      <section class="workbench">
        <header class="lab-header">
          <div>
            <p class="section-label">当前模块</p>
            <h2 id="module-title">系数 a 的魔法</h2>
          </div>
          <div class="status-strip">
            <span class="status-dot"></span>
            <span id="status-text">可操作</span>
          </div>
        </header>

        <div class="control-rack" aria-label="探究控制">
          <div class="segmented-control">
            <button class="segment active" type="button" data-mode="observe">观察</button>
            <button class="segment" type="button" data-mode="verify">验证</button>
            <button class="segment" type="button" data-mode="prove">证明</button>
          </div>
          <div class="proof-controls">
            <button class="tool-button warn" type="button" id="reset-board">重置</button>
            <button class="tool-button" type="button" id="toggle-result">显示结论</button>
          </div>
        </div>

        <div class="board-wrap">
          <div id="jxg-board" class="jxgbox" aria-label="交互画板"></div>
        </div>

        <footer class="prompt-panel">
          <p class="prompt-label">探究提示</p>
          <p id="prompt-text">拖动右侧「a」滑块，观察抛物线的开口方向和宽窄如何变化。</p>
        </footer>
      </section>

      <!-- === 右侧数据面板 === -->
      <aside class="data-panel" aria-label="数据面板">
        <div class="param-section">
          <h3>参数控制</h3>
          <div id="param-sliders"></div>
        </div>

        <section class="metric-card">
          <p class="panel-label">测量数据</p>
          <div id="data-metrics">
            <div class="metric-row">
              <span class="metric-key">函数解析式</span>
              <span class="metric-val accent" id="metric-expr">y = x²</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">顶点坐标</span>
              <span class="metric-val" id="metric-vertex">(0, 0)</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">对称轴</span>
              <span class="metric-val" id="metric-axis">x = 0</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">开口</span>
              <span class="metric-val" id="metric-opening">向上，适中</span>
            </div>
          </div>
        </section>

        <section class="metric-card" id="challenge-section" style="display:none">
          <p class="panel-label">挑战进度</p>
          <p id="challenge-hint" class="challenge-hint"></p>
          <button class="tool-button warn" type="button" id="new-challenge" style="width:100%;margin-top:8px">🔄 换一题</button>
        </section>

        <section class="metric-card">
          <p class="panel-label">结论</p>
          <p id="result-text">先操作、观察，再点击"显示结论"。</p>
        </section>

        <div class="life-scene-nav" id="life-scene-nav" style="display:none">
          <button class="life-scene-btn active" type="button" data-scene="ball">🏀 抛球运动</button>
          <button class="life-scene-btn" type="button" data-scene="fountain">⛲ 喷泉水柱</button>
          <button class="life-scene-btn" type="button" data-scene="bridge">🌉 石拱桥</button>
        </div>

        <div style="flex:1"></div>
      </aside>
    </main>

    <script src="vendor/jsxgraph/jsxgraphcore.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
