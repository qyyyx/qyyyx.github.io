    card.appendChild(strategyBox);
    card.appendChild(feedback);
    card.appendChild(revealBox);
    card.appendChild(nextBtn);
    rootEl.appendChild(card);

    var kpBox = el("div", "ss-kp");
    rootEl.appendChild(kpBox);
    container.appendChild(rootEl);

    exitBtn.addEventListener("click", function () {
      destroy();
      if (opts.onExit) opts.onExit();
    });
    nextBtn.addEventListener("click", advance);

    if (cfg.showTimer) {
      timerId = setInterval(function () {
        timerEl.textContent = "⏱ " + fmtMs(Date.now() - sessionStart);
      }, 500);
    }

    keypad = K.createKeypad(kpBox, {
      showWhole: true,
      initialFocus: "n",
      onSubmit: onSubmit,
    });

    showProblem();

    // ---- 流程 ----
    function current() {
      return problems[idx];
    }

    function showProblem() {
      var p = current();
      problemBox.innerHTML = "";
      var eq =
        p.format === "fill_missing"
          ? R.equationEl(p.ast, { t: "f", v: p.target, display: "auto" })
          : R.equationEl(p.ast);
      problemBox.appendChild(eq);
      feedback.textContent = "";
      feedback.className = "ss-feedback";
      revealBox.innerHTML = "";
      nextBtn.style.display = "none";
      retriesLeft = cfg.retries;
      unsimplifiedUsed = false;
      firstErrorTag = null;
      strategyFailed = false;
      renderStrategy(p);
      keypad.clear();
      keypad.setActive("n");
      progress.textContent = idx + 1 + " / " + problems.length;
      if (cfg.showCombo) comboEl.textContent = combo >= 2 ? "🔥×" + combo : "";
      qStart = Date.now();
    }

    function setFeedback(text, cls) {
      feedback.textContent = text;
      feedback.className = "ss-feedback " + (cls || "");
    }

    // ---- 巧算策略选择阶段 ----
    function renderStrategy(p) {
      strategyBox.innerHTML = "";
      strategyPhase = false;
      if (!p.strategy || mode === "assessment") return; // 测评不给策略脚手架
      strategyPhase = true;
      var tries = 0;
      strategyBox.appendChild(el("div", "st-q", "🧠 " + p.strategy.question));
      var optsBox = el("div", "st-opts");
      p.strategy.options.forEach(function (label, i) {
        var b = el("button", "st-opt", label);
        b.type = "button";
        b.addEventListener("click", function () {
          if (!strategyPhase) return;
          if (i === p.strategy.correctIndex) {
            b.classList.add("is-right");
            strategyPhase = false;
            setFeedback("策略正确！按这个思路算出答案 →", "is-good");
            optsBox.querySelectorAll(".st-opt").forEach(function (x) {
              if (x !== b) x.disabled = true;
            });
          } else {
            tries++;
            b.classList.add("is-wrong");
            b.disabled = true;
            if (tries >= 2) {
              strategyFailed = true;
              strategyPhase = false;
              var right = optsBox.querySelectorAll(".st-opt")[p.strategy.correctIndex];
              right.classList.add("is-right");
              setFeedback("巧招是：" + p.strategy.options[p.strategy.correctIndex] + "，照着算算看", "is-warn");
            } else {
              setFeedback("这样算会很累，再想想", "is-warn");
            }
          }
        });
        optsBox.appendChild(b);
      });
      strategyBox.appendChild(optsBox);
    }

    function record(correct, half, errorTag, givenFrac) {
      records.push({
        problem: current(),
        correct: correct,
        half: half,
        errorTag: errorTag || null,
        given: givenFrac ? E.toString(givenFrac) : null,
        ms: Date.now() - qStart,
      });
    }

    function onSubmit(kpValue) {
      if (finished || nextBtn.style.display !== "none") return;
      if (strategyPhase) {
        setFeedback("先选好策略，再动手计算", "is-warn");
        return;
      }
      var p = current();
      var r = C.check(p, kpValue);

      if (r.verdict === "invalid") {
        setFeedback(
          kpValue.reason === "zero_den" ? "分母不能是 0" : kpValue.reason === "half_fraction" ? "分子分母要填全" : "先输入答案",
          "is-bad"
        );
        return;
      }

      if (r.verdict === "correct") {
        combo++;
        record(true, unsimplifiedUsed || strategyFailed, null, kpValue.frac);
        if (cfg.liveFeedback) setFeedback(combo >= 3 ? "✔ 正确！连击 ×" + combo : "✔ 正确！", "is-good");
        else setFeedback("已提交", "");
        autoNext();
        return;
      }

      if (r.verdict === "unsimplified") {
        if (mode === "assessment") {
          record(true, true, null, kpValue.frac);
          setFeedback("已提交", "");
          combo = 0;
          autoNext();
          return;
        }
        if (!unsimplifiedUsed) {
          unsimplifiedUsed = true;
          setFeedback("答案等值！再化简 / 化成规范形式", "is-warn");
          return;
        }
        combo = 0;
        record(true, true, null, kpValue.frac);
        setFeedback("记为答对，注意结果要最简哦", "is-warn");
        autoNext();
        return;
      }

      // wrong
      if (r.errorTag && !firstErrorTag) firstErrorTag = r.errorTag;
      if (mode === "practice" && retriesLeft > 0) {
        retriesLeft--;
        setFeedback("再想想，还有一次机会", "is-bad");
        return;
      }
      combo = 0;
      record(false, false, firstErrorTag || r.errorTag, kpValue.frac);
      if (mode === "assessment") {
        setFeedback("已提交", "");
        autoNext();
        return;
      }
      if (cfg.revealOnFail) {
        setFeedback("正确答案是：", "is-bad");
        revealBox.innerHTML = "";
        revealBox.appendChild(R.valueEl(p.answer, "auto"));
        var Sol = optDep("SolutionPanel");
        if (Sol) {
          var solBtn = el("button", "ss-sol-btn", "📖 看分步解析");
          solBtn.type = "button";
          solBtn.addEventListener("click", function () {
            rootEl.appendChild(Sol.overlay(p));
          });
          revealBox.appendChild(solBtn);
        }
        nextBtn.style.display = "";
        return;
      }
      setFeedback("✗", "is-bad");
      autoNext();
    }

    var autoTimer = null;
    function autoNext() {
      autoTimer = setTimeout(advance, 750);
    }

    function advance() {
      if (finished) return;
      if (autoTimer) {
        clearTimeout(autoTimer);
        autoTimer = null;
      }
      idx++;
      if (idx >= problems.length) finish();
      else showProblem();
    }

    function finish() {
      finished = true;
      var summary = S.summarize(records);
      var threshold = S.avgThresholdMs(opts.levelId, opts.tier);
      var stars = mode === "assessment" || mode === "challenge" ? S.starsFor(summary.accuracy, summary.avgMs, threshold) : null;
      var pts = S.pointsFor(summary, { mode: mode, levelId: opts.levelId, tier: opts.tier, dailyFactor: opts.dailyFactor });
      var result = {
        levelId: opts.levelId,
        tier: opts.tier,
        mode: mode,
        summary: summary,
        stars: stars,
        points: pts.points,
        breakdown: pts.breakdown,
        records: records,
        finishedAt: Date.now(),
      };
      renderResult(result);
      if (opts.onFinish) opts.onFinish(result);
    }

    function renderResult(result) {
      if (timerId) clearInterval(timerId);
      keypad.destroy();
      rootEl.innerHTML = "";
      var s = result.summary;
      var box = el("div", "card ss-result");
      box.appendChild(el("h2", "ss-result-title", MODE_NAME[mode] + "完成！"));
      if (result.stars !== null) {
        box.appendChild(el("div", "ss-stars", "★★★".slice(0, result.stars) + "☆☆☆".slice(0, 3 - result.stars)));
      }
      var grid = el("div", "ss-stats");
      [
        ["题数", s.count],
        ["答对", s.full + (s.half ? " (+" + s.half + " 补答)" : "")],
        ["正确率", Math.round(s.accuracy * 100) + "%"],
        ["总用时", fmtMs(s.totalMs)],
        ["平均", Math.round(s.avgMs / 100) / 10 + "s/题"],
        ["最高连击", s.maxCombo],
        ["积分", "+" + result.points],
      ].forEach(function (pair) {
        var cell = el("div", "ss-stat");
        cell.appendChild(el("div", "ss-stat-v", pair[1]));
        cell.appendChild(el("div", "ss-stat-k", pair[0]));
        grid.appendChild(cell);
      });
      box.appendChild(grid);

      var wrongs = records.filter(function (r) {
        return !r.correct;
      });
      if (wrongs.length) {
        box.appendChild(el("h3", "ss-wrong-title", "错题复盘（" + wrongs.length + "）"));
        var Sol2 = optDep("SolutionPanel");
        wrongs.forEach(function (r) {
          var row = el("div", "ss-wrong-row");
          row.appendChild(R.equationEl(r.problem.ast, { t: "f", v: r.problem.answer, display: "auto" }));
          var meta = el("span", "ss-wrong-given", "你的答案：" + (r.given || "—") + (r.errorTag ? " · " + errorTagText(r.errorTag) : ""));
          if (Sol2) {
            var sb = el("button", "ss-sol-btn ss-sol-btn-sm", "解析");
            sb.type = "button";
            sb.addEventListener("click", function () {
              rootEl.appendChild(Sol2.overlay(r.problem));
            });
            meta.appendChild(sb);
          }
          row.appendChild(meta);
          box.appendChild(row);
        });
      }

      var btns = el("div", "ss-result-btns");
      var again = el("button", "ss-btn ss-btn-primary", "再来一局");
      again.type = "button";
      again.addEventListener("click", function () {
        destroy();
        create(container, Object.assign({}, opts, { seed: "s" + Date.now() }));
      });
      var exit = el("button", "ss-btn", "返回");
      exit.type = "button";
      exit.addEventListener("click", function () {
        destroy();
        if (opts.onExit) opts.onExit();
      });
      btns.appendChild(again);
      btns.appendChild(exit);
      box.appendChild(btns);
      rootEl.appendChild(box);
    }

    function errorTagText(tag) {
      var map = {
        added_denominators: "异分母不能直接相加减，要先通分",
        forgot_invert: "除以分数 = 乘它的倒数",
        order_of_operations: "先乘除，后加减",
        borrow_error: "退位借 1 检查一下",
      };
      return map[tag] || "";
    }

    function destroy() {
      if (timerId) clearInterval(timerId);
      if (autoTimer) clearTimeout(autoTimer);
      if (keypad) keypad.destroy();
      finished = true;
      rootEl.remove();
    }

    return {
      root: rootEl,
      destroy: destroy,
      getCurrent: current,
      getRecords: function () {
        return records;
      },
      submitValue: onSubmit, // 供自动化测试驱动
      advance: advance,
    };
  }

  return { create: create, MODE_NAME: MODE_NAME };
});

</script>
<script>
/**
 * map.js — 关卡星图主页（UMD）· M4
 * 主线 L1→L6 顺序解锁；L7/L8 高手支线（L5 拿星开启）。
 * 点击已解锁关卡 → 弹出配置面板（档位/模式/题数）→ 回调 onStart。
 */
(function (root, factory) {
  if (typeof module === "object" && module.exports) {
    module.exports = factory();
  } else {
    root.LevelMap = factory();
  }
})(typeof self !== "undefined" ? self : this, function () {
  "use strict";

  var LEVELS = [
    { id: "L1", name: "同分母加减", icon: "🌱" },
    { id: "L2", name: "异分母加减", icon: "🌿" },
    { id: "L3", name: "带分数加减", icon: "🌾" },
    { id: "L4", name: "分数乘法", icon: "✨" },
    { id: "L5", name: "分数除法", icon: "🔁" },
    { id: "L6", name: "四则混合", icon: "🌪" },
  ];
  var BRANCH = [
    { id: "L7", name: "巧算·提公因数", icon: "🗝" },
    { id: "L8", name: "巧算·高手殿堂", icon: "🏛" },
  ];

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined && text !== null) e.textContent = String(text);
    return e;
  }

  function starText(n) {
    return "★★★".slice(0, n) + "☆☆☆".slice(0, 3 - n);
  }

  /**
   * create(container, { store, onStart(levelId, levelName, tier, mode, count) })
   * 返回 { refresh, root }
   */
  function create(container, opts) {
    var store = opts.store;
    var rootEl = el("div", "mp");

    // 头部：品牌 + 积分 + 每日目标环 + 连续打卡
    var header = el("div", "mp-header card");
    var brand = el("div", "mp-brand");
    brand.appendChild(el("div", "mp-title", "🍉 分数计算训练营"));
    brand.appendChild(el("div", "mp-sub", "西瓜实验室 · 计算训练基座"));
    header.appendChild(brand);
    var pointsEl = el("div", "mp-points", "");
    header.appendChild(pointsEl);
    var dailyBox = el("div", "mp-daily");
    header.appendChild(dailyBox);
    rootEl.appendChild(header);

    // 动作行（错题本 / 武器库等外部入口）
    var actionsRow = el("div", "mp-actions");
    (opts.actions || []).forEach(function (a) {
      var b = el("button", "mp-action", "");
      b.type = "button";
      b.setAttribute("data-action", a.id || "");
      b.addEventListener("click", a.onClick);
      a._el = b;
      actionsRow.appendChild(b);
    });
    if ((opts.actions || []).length) rootEl.appendChild(actionsRow);

    var mainRow = el("div", "mp-row");
    rootEl.appendChild(mainRow);
    var branchTitle = el("div", "mp-branch-title", "🗝 巧算高手线（通过 L5 解锁）");
    rootEl.appendChild(branchTitle);
    var branchRow = el("div", "mp-row mp-row-branch");
    rootEl.appendChild(branchRow);

    // 配置弹层
    var overlay = el("div", "mp-overlay");
    overlay.style.display = "none";
    var dialog = el("div", "mp-dialog card");
    overlay.appendChild(dialog);
    rootEl.appendChild(overlay);
    overlay.addEventListener("click", function (ev) {
      if (ev.target === overlay) closeDialog();
    });

    function closeDialog() {
      overlay.style.display = "none";
    }

    function openDialog(level) {
      dialog.innerHTML = "";
      dialog.appendChild(el("h3", "mp-dialog-title", level.icon + " " + level.id + " " + level.name));
      var lp = store.levelProgress(level.id);
      var tierRow = el("div", "mp-dialog-tiers");
      [1, 2, 3].forEach(function (t) {
        var stars = lp.tierStars[t] || 0;
        var tb = el("button", "mp-tier", "");
        tb.type = "button";
        tb.appendChild(el("div", "mp-tier-name", { 1: "入门", 2: "熟练", 3: "挑战" }[t]));
        tb.appendChild(el("div", "mp-tier-stars", starText(stars)));
        tb.addEventListener("click", function () {
          tierRow.querySelectorAll(".mp-tier").forEach(function (x) {
            x.classList.remove("is-picked");
          });
          tb.classList.add("is-picked");
          picked.tier = t;
        });
        if (t === 1) tb.classList.add("is-picked");
        tierRow.appendChild(tb);
      });
      dialog.appendChild(tierRow);

      var picked = { tier: 1, mode: "practice", count: 10 };
      var modeRow = el("div", "mp-dialog-modes");
      [
        ["practice", "练习（不限时）"],
        ["challenge", "挑战（计时连击）"],
        ["assessment", "测评（10 题定星）"],
      ].forEach(function (pair, i) {
        var mb = el("button", "mp-mode" + (i === 0 ? " is-picked" : ""), pair[1]);
        mb.type = "button";
        mb.addEventListener("click", function () {
          modeRow.querySelectorAll(".mp-mode").forEach(function (x) {
            x.classList.remove("is-picked");
          });
          mb.classList.add("is-picked");
          picked.mode = pair[0];
        });
        modeRow.appendChild(mb);
      });
      dialog.appendChild(modeRow);

      var countRow = el("div", "mp-dialog-counts");
      countRow.appendChild(el("span", "mp-count-label", "题数"));
      [5, 10, 20].forEach(function (c) {
        var cb = el("button", "mp-count" + (c === 10 ? " is-picked" : ""), c);
        cb.type = "button";
        cb.addEventListener("click", function () {
          countRow.querySelectorAll(".mp-count").forEach(function (x) {
            x.classList.remove("is-picked");
          });
          cb.classList.add("is-picked");
          picked.count = c;
        });
        countRow.appendChild(cb);
      });
      dialog.appendChild(countRow);

      var goRow = el("div", "mp-dialog-go");
      var cancel = el("button", "ss-btn", "取消");
      cancel.type = "button";
      cancel.addEventListener("click", closeDialog);
      var go = el("button", "ss-btn ss-btn-primary", "开始 ▶");
      go.type = "button";
      go.addEventListener("click", function () {
        closeDialog();
        opts.onStart(level.id, level.id + " " + level.name, picked.tier, picked.mode, picked.mode === "assessment" ? 10 : picked.count);
      });
      goRow.appendChild(cancel);
      goRow.appendChild(go);
      dialog.appendChild(goRow);
      overlay.style.display = "";
    }

    function nodeFor(level) {
      var unlocked = store.isUnlocked(level.id);
      var stars = store.levelStar(level.id);
      var node = el("button", "mp-node" + (unlocked ? "" : " is-locked") + (level.soon ? " is-soon" : ""));
      node.type = "button";
      node.setAttribute("data-level", level.id);
      node.appendChild(el("div", "mp-node-icon", unlocked ? level.icon : "🔒"));
      node.appendChild(el("div", "mp-node-name", level.id + " " + level.name));
      node.appendChild(el("div", "mp-node-stars", unlocked ? starText(stars) : ""));
      node.addEventListener("click", function () {
        if (!unlocked) {
          node.classList.add("is-shake");
          setTimeout(function () {
            node.classList.remove("is-shake");
          }, 400);
          return;
        }
        openDialog(level);
      });
      return node;
    }

    function refresh() {
      (opts.actions || []).forEach(function (a) {
        if (a._el) a._el.textContent = typeof a.label === "function" ? a.label() : a.label;
      });
      pointsEl.textContent = "🪙 " + store.get("wallet").points;
      var d = store.get("daily");
      var done = d.date === store.todayStr() ? d.done : 0;
      var pct = Math.min(1, done / d.target);
      dailyBox.innerHTML =
        '<svg viewBox="0 0 44 44" class="mp-ring"><circle cx="22" cy="22" r="18" fill="none" stroke="#e2e8f0" stroke-width="5"/>' +
        '<circle cx="22" cy="22" r="18" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" transform="rotate(-90 22 22)" stroke-dasharray="' +
        (Math.PI * 36 * pct).toFixed(1) + " " + (Math.PI * 36).toFixed(1) + '"/></svg>';
      var dailyText = el("div", "mp-daily-text");
      dailyText.appendChild(el("div", "mp-daily-num", done + "/" + d.target));
      dailyText.appendChild(el("div", "mp-daily-label", d.streak > 0 ? "连续 " + d.streak + " 天" : "今日目标"));
      dailyBox.appendChild(dailyText);

      mainRow.innerHTML = "";
      LEVELS.forEach(function (lv, i) {
        mainRow.appendChild(nodeFor(lv));
        if (i < LEVELS.length - 1) mainRow.appendChild(el("span", "mp-link", "➤"));
      });
      branchRow.innerHTML = "";
      BRANCH.forEach(function (lv, i) {
        branchRow.appendChild(nodeFor(lv));
        if (i < BRANCH.length - 1) branchRow.appendChild(el("span", "mp-link", "➤"));
      });
    }

    refresh();
    container.appendChild(rootEl);
    return { refresh: refresh, root: rootEl, LEVELS: LEVELS, BRANCH: BRANCH };
  }

  return { create: create, LEVELS: LEVELS, BRANCH: BRANCH };
});

</script>
<script>
/**
 * mistakes.js — 错题本页（UMD）· M5
 * 列表（错因 + 次数 + 解析）+ 重做原题 + 同类变式再练（同关同档新 seed 生成）。
 */
(function (root, factory) {
  if (typeof module === "object" && module.exports) {
    module.exports = factory(require("../engine/problem-gen.js"), null, null);
  } else {
    root.MistakesUI = factory(root.ProblemGen, root.FracRender, root.SolutionPanel);
  }
})(typeof self !== "undefined" ? self : this, function (G, R, Sol) {
  "use strict";

  var ERROR_TEXT = {
    added_denominators: "异分母直接相加减",
    forgot_invert: "除法忘了倒数",
    order_of_operations: "运算顺序",
    borrow_error: "借位",
  };

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined && text !== null) e.textContent = String(text);
    return e;
  }

  function entryToProblem(m) {
    return {
      id: "mistake-" + m.text,
      levelId: m.levelId,
      tier: m.tier,
      mode: "mistake",
      format: m.format,
      ast: m.ast,
      target: m.target,
      answer: m.answer,
      answerDisplay: "auto",
      abilityTags: m.abilityTags,
      difficulty: m.tier,
      text: m.text,
    };
  }

  /**
   * create(container, { store, onPractice(problems, label), onBack })
   */
  function create(container, opts) {
    var store = opts.store;
    var rootEl = el("div", "mk");

    var bar = el("div", "mk-bar");
    var back = el("button", "ss-exit", "← 返回");
    back.type = "button";
    back.addEventListener("click", opts.onBack);
    bar.appendChild(back);
    bar.appendChild(el("span", "ss-title", "📕 错题本"));
    rootEl.appendChild(bar);

    var actions = el("div", "mk-actions");
    var redoBtn = el("button", "ss-btn ss-btn-primary", "重做原题");
    redoBtn.type = "button";
    var variantBtn = el("button", "ss-btn", "同类变式练");
    variantBtn.type = "button";
    actions.appendChild(redoBtn);
    actions.appendChild(variantBtn);
    rootEl.appendChild(actions);

    var listBox = el("div", "mk-list");
    rootEl.appendChild(listBox);

    function activeEntries() {
      return store.getMistakes(true);
    }

    redoBtn.addEventListener("click", function () {
      var entries = activeEntries().slice(0, 10);
      if (!entries.length) return;
      opts.onPractice(entries.map(entryToProblem), "错题重做");
    });

    variantBtn.addEventListener("click", function () {
      var entries = activeEntries().slice(0, 10);
      if (!entries.length) return;
      var problems = [];
      entries.forEach(function (m, i) {
        try {
          var p = G.generateProblem({
            levelId: m.levelId,
            tier: m.tier,
            mode: "mistake",
            seed: "variant-" + Date.now() + "-" + i,
          });
          problems.push(p);
        } catch (e) {
          /* 单题生成失败跳过 */
        }
      });
      if (problems.length) opts.onPractice(problems, "变式再练");
    });

    function refresh() {
      var all = store.getMistakes(false);
      var active = all.filter(function (m) {
        return !m.mastered;
      });
      redoBtn.disabled = variantBtn.disabled = active.length === 0;
      listBox.innerHTML = "";
      if (!all.length) {
        listBox.appendChild(el("div", "mk-empty", "还没有错题，太棒了！去闯关吧 🎉"));
        return;
      }
      all.forEach(function (m) {
        var row = el("div", "mk-row card" + (m.mastered ? " is-mastered" : ""));
        var eq =
          m.format === "fill_missing"
            ? R.equationEl(m.ast, { t: "f", v: m.target, display: "auto" })
            : R.equationEl(m.ast);
        row.appendChild(eq);
        var meta = el("div", "mk-meta");
        var tags = [m.levelId + " · T" + m.tier, "错 " + m.count + " 次"];
        if (m.errorTag && ERROR_TEXT[m.errorTag]) tags.push("薄弱点：" + ERROR_TEXT[m.errorTag]);
        if (m.mastered) tags.push("✅ 已掌握");
        meta.appendChild(el("span", "mk-tags", tags.join("　")));
        var solBtn = el("button", "ss-sol-btn ss-sol-btn-sm", "解析");
        solBtn.type = "button";
        solBtn.addEventListener("click", function () {
          rootEl.appendChild(Sol.overlay(entryToProblem(m)));
        });
        meta.appendChild(solBtn);
        row.appendChild(meta);
        listBox.appendChild(row);
      });
    }

    refresh();
    container.appendChild(rootEl);
    return { refresh: refresh, root: rootEl };
  }

  return { create: create, entryToProblem: entryToProblem, ERROR_TEXT: ERROR_TEXT };
});

</script>
<script>
/*
 * achievements.js —— 交互课件「成就/激励系统」代码底座
 * ---------------------------------------------------------------
 * 来源：从成品 lights-out.html / polyomino-tiling.html 的成就系统提炼。
 * 特性：零依赖、原生 JS、可直接 file:// 打开、可整段内联进单 HTML。
 * 用法与设计说明见：references/patterns-library.md →「成就系统底座」。
 *
 * 设计要点（务必照做）：
 *  - 成就奖励「发现 / 掌握」里程碑，不奖励「点击次数」。
 *  - 声明式成就表 + check(state) 谓词；状态变更后调用 ach.check(state) 即可。
 *  - localStorage 持久化（带版本号 key），刷新后进度保留。
 *  - 解锁即 toast；可选奖杯弹窗 + 进度条。
 * ---------------------------------------------------------------
 */
(function (global) {
  'use strict';

  /**
   * @param {Object}   options
   * @param {Array}    options.defs            成就定义：{ id, icon, name, desc, check?(state)=>bool }
   * @param {string}   options.storageKey      localStorage key，建议带版本号，如 'lights-out-ach-v1'
   * @param {number}  [options.toastDuration]  toast 停留毫秒，默认 4200
   * @param {Function}[options.onUnlock]       每解锁一项的回调 (def) => void（可选，用于撒花/音效）
   */
  function createAchievements(options) {
    options = options || {};
    var defs = options.defs || [];
    var storageKey = options.storageKey || 'courseware-achievements-v1';
    var toastDuration = options.toastDuration || 4200;
    var onUnlock = typeof options.onUnlock === 'function' ? options.onUnlock : null;

    var unlocked = new Set();

    function findDef(id) {
      for (var i = 0; i < defs.length; i++) { if (defs[i].id === id) return defs[i]; }
      return null;
    }
    function load() {
      try {
        var raw = global.localStorage.getItem(storageKey);
        if (raw) JSON.parse(raw).forEach(function (id) { unlocked.add(id); });
      } catch (e) { /* 隐私模式 / file:// 受限时静默降级 */ }
    }
    function save() {
      try { global.localStorage.setItem(storageKey, JSON.stringify(Array.from(unlocked))); }
      catch (e) { /* 静默降级：本次会话仍可用，只是不持久 */ }
    }

    // ---- toast（懒创建容器，无需在 HTML 里预置） ----
    function toastStack() {
      var el = document.getElementById('achToastStack');
      if (!el) {
        el = document.createElement('div');
        el.id = 'achToastStack';
        el.className = 'ach-toast-stack';
        document.body.appendChild(el);
      }
      return el;
    }
    function showToast(def) {
      var el = document.createElement('div');
      el.className = 'ach-toast';
      el.innerHTML =
        '<div class="ach-toast-title"><span>🏆</span>解锁成就</div>' +
        '<div class="ach-toast-name">' + (def.icon || '') + ' ' + def.name + '</div>' +
        '<div class="ach-toast-desc">' + (def.desc || '') + '</div>';
      toastStack().appendChild(el);
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, toastDuration);
    }

    // ---- 进度反馈（按 data 属性自动挂载，无则跳过） ----
    function updateProgress() {
      var got = count(), tot = Math.max(1, total());
      var bar = document.querySelector('[data-ach-progress]');
      if (bar) bar.style.width = Math.round(got / tot * 100) + '%';
      var c = document.querySelector('[data-ach-count]'); if (c) c.textContent = count();
      var t = document.querySelector('[data-ach-total]'); if (t) t.textContent = total();
    }

    function fire(def) {
      save();
      showToast(def);
      updateProgress();
      if (onUnlock) onUnlock(def);
    }

    // 命令式解锁：用于「做了某动作就解锁」的离散事件
    function unlock(id) {
      if (unlocked.has(id)) return false;
      var def = findDef(id);
      if (!def) return false;
      unlocked.add(id);
      fire(def);
      return true;
    }

    // 声明式解锁：传入当前 state，自动解锁所有 check(state) 为真者
    function check(state) {
      var fresh = [];
      for (var i = 0; i < defs.length; i++) {
        var def = defs[i];
        if (def.check && !unlocked.has(def.id) && def.check(state)) {
          unlocked.add(def.id);
          fresh.push(def);
        }
      }
      if (fresh.length) { fresh.forEach(fire); }
      return fresh;
    }

    function has(id) { return unlocked.has(id); }
    function count() { return defs.filter(function (d) { return unlocked.has(d.id); }).length; }
    function total() { return defs.length; }
    function reset() { unlocked.clear(); save(); updateProgress(); }

    // 可选：把成就清单渲染进某个容器（用于奖杯弹窗）
    function renderList(container) {
      if (!container) return;
      container.innerHTML = '';
      defs.forEach(function (def) {
        var got = unlocked.has(def.id);
        var row = document.createElement('div');
        row.className = 'ach-row' + (got ? ' is-unlocked' : '');
        row.innerHTML =
          '<div class="ach-icon">' + (got ? (def.icon || '🏆') : '🔒') + '</div>' +
          '<div class="ach-meta"><div class="ach-name">' + def.name + '</div>' +
          '<div class="ach-desc">' + (def.desc || '') + '</div></div>' +
          '<div class="ach-status">' + (got ? '✓ 已解锁' : '未解锁') + '</div>';
        container.appendChild(row);
      });
      updateProgress();
    }

    load();
    updateProgress();

    return {
      check: check,        // 声明式：状态变更后调用 ach.check(state)
      unlock: unlock,      // 命令式：离散事件触发 ach.unlock(id)
      has: has,
      count: count,
      total: total,
      reset: reset,
      renderList: renderList
    };
  }

  global.createAchievements = createAchievements;
  if (typeof module !== 'undefined' && module.exports) { module.exports = { createAchievements: createAchievements }; }
})(typeof window !== 'undefined' ? window : this);

</script>
<script>
/**
 * achievements-defs.js — 成就定义与状态装配 · M7
 * 原则（skill 黑名单第 3 条）：只奖励「发现与掌握」里程碑，不奖励点击次数。
 */
(function (root, factory) {
  if (typeof module === "object" && module.exports) module.exports = factory();
  else root.AchDefs = factory();
})(typeof self !== "undefined" ? self : this, function () {
  "use strict";

  var DEFS = [
    { id: "first_session", icon: "🚀", name: "首战告捷", desc: "完成第一局训练",
      check: function (s) { return s.totalPlays >= 1; } },
    { id: "simplify_guard", icon: "🧼", name: "最简卫士", desc: "单局 10 题以上全对，且没有一题需要补化简",
      check: function (s) { return s.lastCount >= 10 && s.lastFull === s.lastCount; } },
    { id: "common_den_master", icon: "🔀", name: "通分小能手", desc: "L2 异分母加减测评拿到 2 星以上",
      check: function (s) { return s.lastMode === "assessment" && s.lastLevelId === "L2" && s.lastStars >= 2; } },
    { id: "borrow_calm", icon: "🧱", name: "借位不慌", desc: "L3 挑战档测评拿到 2 星以上",
      check: function (s) { return s.lastMode === "assessment" && s.lastLevelId === "L3" && s.lastTier === 3 && s.lastStars >= 2; } },
    { id: "invert_ninja", icon: "🥷", name: "倒数忍者", desc: "L5 分数除法测评拿到 3 星",
      check: function (s) { return s.lastMode === "assessment" && s.lastLevelId === "L5" && s.lastStars === 3; } },
    { id: "combo_10", icon: "🔥", name: "连击大师", desc: "单局连击 10 题不断",
      check: function (s) { return s.lastMaxCombo >= 10; } },
    { id: "star_10", icon: "🌟", name: "摘星少年", desc: "全星图累计点亮 10 颗星",
      check: function (s) { return s.totalStars >= 10; } },
    { id: "smart_eye", icon: "👁", name: "巧算之眼", desc: "巧算题一眼选对策略并算对答案",
      check: function (s) { return s.smartCleanHit; } },
    { id: "mistake_sweeper", icon: "🧹", name: "错题清道夫", desc: "累计歼灭（掌握）5 道错题",
      check: function (s) { return s.masteredMistakes >= 5; } },
    { id: "grand_master", icon: "👑", name: "学成出师", desc: "八大关卡全部至少 1 星",
      check: function (s) { return s.starredLevels >= 8; } },
  ];

  var ALL_LEVELS = ["L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8"];

  /** 从 store + 刚结束的 result 装配成就判定状态 */
  function buildState(store, result) {
    var totalStars = 0;
    var starredLevels = 0;
    ALL_LEVELS.forEach(function (lv) {
      var ts = store.levelProgress(lv).tierStars;
      var lvMax = 0;
      Object.keys(ts).forEach(function (t) {
        totalStars += ts[t];
        if (ts[t] > lvMax) lvMax = ts[t];
      });
      if (lvMax >= 1) starredLevels++;
    });
    var mastered = store.getMistakes(false).filter(function (m) {
      return m.mastered;
    }).length;
    var smartCleanHit = false;
    if (result && result.records) {
      smartCleanHit = result.records.some(function (r) {
        return r.problem && r.problem.strategy && r.correct && !r.half;
      });
    }
    var s = result ? result.summary : { count: 0, full: 0, maxCombo: 0 };
    return {
      totalPlays: store.get("sessions").length,
      totalStars: totalStars,
      starredLevels: starredLevels,
      masteredMistakes: mastered,
      smartCleanHit: smartCleanHit,
      lastMode: result ? result.mode : null,
      lastLevelId: result ? result.levelId : null,
      lastTier: result ? result.tier : null,
      lastStars: result ? result.stars || 0 : 0,
      lastCount: s.count,
      lastFull: s.full,
      lastMaxCombo: s.maxCombo,
    };
  }

  return { DEFS: DEFS, buildState: buildState };
});

</script>
<script>
(function () {
  var store = window.Store.create();
  var ach = window.createAchievements({
    defs: window.AchDefs.DEFS,
    storageKey: "calcbase-ach-v1",
  });
  var mapView = document.getElementById("map-view");
  var sessionView = document.getElementById("session-view");
  var mistakesView = document.getElementById("mistakes-view");

  function show(view) {
    mapView.style.display = view === "map" ? "" : "none";
    sessionView.style.display = view === "session" ? "" : "none";
    mistakesView.style.display = view === "mistakes" ? "" : "none";
  }

  function openAchievements() {
    var mask = document.createElement("div");
    mask.className = "sol-overlay";
    var panel = document.createElement("div");
    panel.className = "sol-panel card";
    var bar = document.createElement("div");
    bar.className = "sol-bar";
    var title = document.createElement("span");
    title.className = "sol-bar-title";
    title.textContent = "🏆 成就墙（" + ach.count() + "/" + ach.total() + "）";
    var close = document.createElement("button");
    close.className = "sol-close";
    close.type = "button";
    close.textContent = "✕";
    close.addEventListener("click", function () { mask.remove(); });
    bar.appendChild(title);
    bar.appendChild(close);
    panel.appendChild(bar);
    var list = document.createElement("div");
    panel.appendChild(list);
    ach.renderList(list);
    mask.appendChild(panel);
    mask.addEventListener("click", function (ev) { if (ev.target === mask) mask.remove(); });
    document.body.appendChild(mask);
  }

  function startSession(cfg) {
    show("session");
    window.__session = window.SessionUI.create(sessionView, {
      levelId: cfg.levelId,
      levelName: cfg.levelName,
      tier: cfg.tier,
      mode: cfg.mode,
      count: cfg.count,
      problems: cfg.problems || null,
      dailyFactor: store.getDailyFactor(cfg.mode, cfg.levelId, cfg.tier),
      onFinish: function (result) {
        store.recordSession(result);
        ach.check(window.AchDefs.buildState(store, result));
      },
      onExit: function () {
        show("map");
        map.refresh();
        window.__session = null;
      },
    });
  }

  var map = window.LevelMap.create(mapView, {
    store: store,
    actions: [
      {
        id: "mistakes",
        label: function () {
          var n = store.getMistakes(true).length;
          return "📕 错题本" + (n ? "（" + n + "）" : "");
        },
        onClick: function () {
          show("mistakes");
          mistakesView.innerHTML = "";
          window.__mistakes = window.MistakesUI.create(mistakesView, {
            store: store,
            onBack: function () {
              show("map");
              map.refresh();
            },
            onPractice: function (problems, label) {
              mistakesView.innerHTML = "";
              startSession({
                levelId: problems[0].levelId,
                levelName: label,
                tier: problems[0].tier,
                mode: "mistake",
                count: problems.length,
                problems: problems,
              });
            },
          });
        },
      },
      {
        id: "achievements",
        label: function () {
          return "🏆 成就 " + ach.count() + "/" + ach.total();
        },
        onClick: openAchievements,
      },
      {
        id: "arsenal",
        label: "🛡 武器库",
        onClick: function () {
          document.body.appendChild(window.ArsenalPanel.overlay());
        },
      },
    ],
    onStart: function (levelId, levelName, tier, mode, count) {
      startSession({ levelId: levelId, levelName: levelName, tier: tier, mode: mode, count: count });
    },
  });

  window.__store = store;
  window.__map = map;
  window.__ach = ach;
})();
</script>
