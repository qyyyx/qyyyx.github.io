<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>分数计算训练营 · 西瓜实验室</title>
<link rel="icon" href="data:," />
<style>
/* 计算训练基座 · 全局样式（M1：设计令牌 + 分数渲染 + 键盘） */
:root {
  --brand: #3b82f6;
  --brand-dark: #2563eb;
  --bg: #f1f5f9;
  --card: #ffffff;
  --ink: #0f172a;
  --ink-soft: #475569;
  --line: #e2e8f0;
  --good: #16a34a;
  --warn: #d97706;
  --bad: #dc2626;
  --radius: 14px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
}

/* ===== 分数渲染（frac-render.js） ===== */
.fx {
  display: inline-flex;
  align-items: center;
  gap: 0.32em;
  font-size: 1.6rem;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.fx-frac {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  vertical-align: middle;
}

.fx-num {
  padding: 0 0.28em 0.12em;
  border-bottom: 0.075em solid currentColor;
  text-align: center;
}

.fx-den {
  padding: 0.12em 0.28em 0;
  text-align: center;
}

/* 嵌套（繁分数）逐层缩小 */
.fx-frac .fx-frac { font-size: 0.82em; }

.fx-mixed {
  display: inline-flex;
  align-items: center;
  gap: 0.14em;
}

.fx-neg { display: inline-flex; align-items: center; gap: 0.1em; }

.fx-whole, .fx-int { font-weight: 600; }

.fx-op { color: var(--ink-soft); padding: 0 0.06em; }
.fx-eq { color: var(--ink); font-weight: 600; }

.fx-paren { color: var(--ink-soft); font-size: 1.35em; font-weight: 300; }

.fx-blank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 1.7em;
  min-height: 1.5em;
  border: 2px dashed var(--brand);
  border-radius: 8px;
  color: var(--brand);
  font-weight: 700;
  background: #eff6ff;
}

/* ===== 分数键盘（frac-keypad.js） ===== */
.kp { max-width: 340px; }

.kp-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-height: 92px;
  margin-bottom: 12px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px;
}

.kp-slot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 58px;
  min-height: 48px;
  padding: 2px 10px;
  border: 2px solid var(--line);
  border-radius: 10px;
  font-size: 1.5rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}

.kp-slot.is-active {
  border-color: var(--brand);
  background: #eff6ff;
}

.kp-slot.is-empty::after {
  content: "​"; /* 零宽字符占位，保持高度 */
}

.kp-slot-w { min-height: 104px; font-size: 1.9rem; }

.kp-fracbox {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.kp-fracbar {
  width: 100%;
  min-width: 64px;
  height: 3px;
  background: var(--ink);
  border-radius: 2px;
}

.kp-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.kp-key {
  min-height: 56px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--card);
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.05s, background 0.15s;
}

.kp-key:active { transform: scale(0.96); background: #e0e7ff; }

.kp-key-submit {
  background: var(--brand);
  border-color: var(--brand-dark);
  color: #fff;
}

.kp-key-submit:active { background: var(--brand-dark); }

.kp-key-back { color: var(--ink-soft); }

@media (max-width: 480px) {
  .fx { font-size: 1.35rem; }
  .kp { max-width: none; }
  .kp-key { min-height: 52px; }
}

/* ===== 答题会话（session.js） ===== */
.m3-wrap { max-width: 640px; margin: 0 auto; padding: 16px; }
.m3-wrap h2 { font-size: 1.05rem; margin: 0 0 12px; }
.cfg-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
.cfg-row label { display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; color: var(--ink-soft); }
.cfg-row select { min-height: 40px; border: 1px solid var(--line); border-radius: 8px; padding: 4px 8px; font-size: 0.95rem; background: #fff; }

.ss { display: flex; flex-direction: column; gap: 14px; }

.ss-hud {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.9rem;
  color: var(--ink-soft);
}

.ss-exit { border: none; background: none; color: var(--ink-soft); cursor: pointer; font-size: 0.9rem; padding: 6px; }
.ss-title { font-weight: 600; color: var(--ink); }
.ss-progress { margin-left: auto; font-variant-numeric: tabular-nums; }
.ss-combo { color: #ea580c; font-weight: 700; }
.ss-timer { font-variant-numeric: tabular-nums; }

.ss-card { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 22px 16px; }
.ss-problem { min-height: 76px; display: flex; align-items: center; max-width: 100%; }
/* 长算式（连乘/多项）允许折行居中，禁止横向溢出 */
.ss-problem .fx { flex-wrap: wrap; justify-content: center; row-gap: 10px; }
.ss-feedback { min-height: 1.4em; font-size: 0.95rem; font-weight: 600; }
.ss-feedback.is-good { color: var(--good); }
.ss-feedback.is-warn { color: var(--warn); }
.ss-feedback.is-bad { color: var(--bad); }
.ss-reveal { min-height: 0; }
.ss-reveal .fx { color: var(--good); }

.ss-kp { display: flex; justify-content: center; }

.ss-next, .ss-btn {
  min-height: 46px;
  padding: 0 22px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--card);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}

.ss-btn-primary, .ss-next { background: var(--brand); border-color: var(--brand-dark); color: #fff; }

.ss-result { display: flex; flex-direction: column; gap: 14px; }
.ss-result-title { margin: 0; font-size: 1.2rem; }
.ss-stars { font-size: 2.2rem; color: #f59e0b; letter-spacing: 6px; }
.ss-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(88px, 1fr)); gap: 10px; }
.ss-stat { text-align: center; background: var(--bg); border-radius: 10px; padding: 10px 4px; }
.ss-stat-v { font-size: 1.15rem; font-weight: 700; }
.ss-stat-k { font-size: 0.75rem; color: var(--ink-soft); margin-top: 2px; }
.ss-wrong-title { margin: 4px 0 0; font-size: 0.95rem; color: var(--ink-soft); }
.ss-wrong-row { display: flex; flex-direction: column; gap: 4px; padding: 10px 0; border-bottom: 1px dashed var(--line); }
.ss-wrong-row .fx { font-size: 1.15rem; }
.ss-wrong-given { font-size: 0.82rem; color: var(--bad); }
.ss-result-btns { display: flex; gap: 12px; }

/* ===== 关卡星图（map.js） ===== */
.app-wrap { max-width: 900px; margin: 0 auto; padding: 16px; }

.mp { display: flex; flex-direction: column; gap: 16px; }

.mp-header { display: flex; align-items: center; gap: 16px; }
.mp-title { font-size: 1.25rem; font-weight: 700; }
.mp-sub { font-size: 0.78rem; color: var(--ink-soft); margin-top: 2px; }
.mp-points { margin-left: auto; font-size: 1.05rem; font-weight: 700; color: #b45309; }
.mp-daily { display: flex; align-items: center; gap: 8px; }
.mp-ring { width: 44px; height: 44px; }
.mp-daily-text { display: flex; flex-direction: column; }
.mp-daily-num { font-weight: 700; font-size: 0.95rem; }
.mp-daily-label { font-size: 0.72rem; color: var(--ink-soft); }

.mp-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.mp-row-branch { opacity: 0.98; }
.mp-branch-title { font-size: 0.85rem; color: var(--ink-soft); margin-top: 4px; }
.mp-link { color: #cbd5e1; font-size: 0.9rem; }

.mp-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 118px;
  padding: 14px 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s;
}
.mp-node:hover { border-color: var(--brand); transform: translateY(-2px); }
.mp-node.is-locked { opacity: 0.55; cursor: not-allowed; }
.mp-node.is-locked:hover { border-color: var(--line); transform: none; }
.mp-node.is-soon { border-style: dashed; }
.mp-node.is-shake { animation: mp-shake 0.35s; }
@keyframes mp-shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.mp-node-icon { font-size: 1.6rem; }
.mp-node-name { font-size: 0.85rem; font-weight: 600; }
.mp-node-stars { font-size: 0.85rem; color: #f59e0b; letter-spacing: 2px; }
.mp-node-soon { font-size: 0.68rem; color: var(--ink-soft); }

.mp-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  padding: 16px;
}
.mp-dialog { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 14px; }
.mp-dialog-title { margin: 0; font-size: 1.05rem; }
.mp-dialog-tiers { display: flex; gap: 8px; }
.mp-tier {
  flex: 1;
  padding: 10px 6px;
  border: 2px solid var(--line);
  border-radius: 10px;
  background: var(--card);
  cursor: pointer;
}
.mp-tier.is-picked { border-color: var(--brand); background: #eff6ff; }
.mp-tier-name { font-weight: 700; }
.mp-tier-stars { color: #f59e0b; font-size: 0.8rem; margin-top: 2px; }
.mp-dialog-modes { display: flex; flex-direction: column; gap: 6px; }
.mp-mode {
  padding: 10px;
  text-align: left;
  border: 2px solid var(--line);
  border-radius: 10px;
  background: var(--card);
  cursor: pointer;
  font-size: 0.92rem;
}
.mp-mode.is-picked { border-color: var(--brand); background: #eff6ff; }
.mp-dialog-counts { display: flex; align-items: center; gap: 8px; }
.mp-count-label { font-size: 0.85rem; color: var(--ink-soft); }
.mp-count {
  min-width: 52px;
  min-height: 40px;
  border: 2px solid var(--line);
  border-radius: 10px;
  background: var(--card);
  font-weight: 700;
  cursor: pointer;
}
.mp-count.is-picked { border-color: var(--brand); background: #eff6ff; }
.mp-dialog-go { display: flex; justify-content: flex-end; gap: 10px; }

@media (max-width: 640px) {
  .mp-header { flex-wrap: wrap; }
  .mp-node { min-width: calc(33% - 8px); }
  .mp-link { display: none; }
}

/* ===== 解析面板 / 武器库浮层（solution.js / arsenal.js） ===== */
.mp-actions { display: flex; gap: 10px; }
.mp-action {
  min-height: 42px;
  padding: 0 16px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--card);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
.mp-action:hover { border-color: var(--brand); }

.sol-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  padding: 16px;
}
.sol-panel {
  width: 100%;
  max-width: 480px;
  max-height: 84vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sol-bar { display: flex; align-items: center; justify-content: space-between; }
.sol-bar-title { font-weight: 700; }
.sol-close { border: none; background: none; font-size: 1.1rem; cursor: pointer; color: var(--ink-soft); padding: 6px; }

.sol { display: flex; flex-direction: column; gap: 10px; }
.sol-head { display: flex; justify-content: center; padding: 6px 0 2px; }
.sol-head .fx { font-size: 1.3rem; }
.sol-note { font-size: 0.82rem; color: var(--ink-soft); }
.sol-step { background: var(--bg); border-radius: 10px; padding: 10px 12px; }
.sol-step-title { font-size: 0.8rem; font-weight: 700; color: var(--brand-dark); margin-bottom: 6px; }
.sol-line { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; font-size: 0.88rem; padding: 3px 0; }
.sol-line-main { font-size: 1rem; }
.sol-line .fx, .sol-fx .fx { font-size: 1em; }
.sol-op { color: var(--ink-soft); padding: 0 2px; }
.sol-final { display: flex; align-items: center; gap: 8px; padding: 6px 2px; }
.sol-final-label { font-weight: 700; color: var(--good); }
.sol-final .fx { font-size: 1.25rem; color: var(--good); }

.ss-sol-btn {
  margin-left: 10px;
  min-height: 34px;
  padding: 0 14px;
  border: 1px solid var(--brand);
  color: var(--brand-dark);
  background: #eff6ff;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}
.ss-sol-btn-sm { min-height: 28px; padding: 0 10px; font-size: 0.78rem; }
.ss-arsenal { border: none; background: none; cursor: pointer; font-size: 0.85rem; color: var(--brand-dark); }

/* 武器库卡片 */
.ar { display: flex; flex-direction: column; gap: 8px; }
.ar-card { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
.ar-head {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border: none;
  background: var(--card);
  cursor: pointer;
  font-size: 0.92rem;
  font-weight: 600;
  text-align: left;
}
.ar-card.is-open .ar-head { background: #eff6ff; }
.ar-chev { margin-left: auto; color: var(--ink-soft); }
.ar-body { padding: 4px 14px 12px; }
.ar-text { margin: 6px 0; font-size: 0.86rem; line-height: 1.5; }
.ar-example { font-size: 0.82rem; color: var(--brand-dark); background: var(--bg); border-radius: 8px; padding: 6px 10px; }

/* 错题本 */
.mk { display: flex; flex-direction: column; gap: 12px; }
.mk-bar { display: flex; align-items: center; gap: 10px; }
.mk-actions { display: flex; gap: 10px; }
.mk-actions .ss-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.mk-list { display: flex; flex-direction: column; gap: 10px; }
.mk-row { display: flex; flex-direction: column; gap: 8px; }
.mk-row .fx { font-size: 1.15rem; }
.mk-row.is-mastered { opacity: 0.6; }
.mk-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
.mk-tags { font-size: 0.8rem; color: var(--ink-soft); }
.mk-empty { text-align: center; color: var(--ink-soft); padding: 30px 0; }

/* ===== 巧算策略选择（session.js） ===== */
.ss-strategy { width: 100%; max-width: 460px; }
.st-q { font-size: 0.92rem; font-weight: 700; margin-bottom: 8px; color: var(--brand-dark); }
.st-opts { display: flex; flex-direction: column; gap: 6px; }
.st-opt {
  padding: 10px 12px;
  border: 2px solid var(--line);
  border-radius: 10px;
  background: var(--card);
  font-size: 0.88rem;
  text-align: left;
  cursor: pointer;
}
.st-opt:hover:not(:disabled) { border-color: var(--brand); }
.st-opt.is-right { border-color: var(--good); background: #f0fdf4; }
.st-opt.is-wrong { border-color: var(--bad); background: #fef2f2; opacity: 0.7; }
.st-opt:disabled { cursor: not-allowed; }

</style>
<style>
/*
 * achievements.css —— 成就系统底座配套样式
 * 配合 achievements.js 使用；可整段内联进单 HTML。
 * 颜色沿用数学实验室型变量（品牌蓝 #3b82f6 / 浅色卡片），无变量时有兜底值。
 */

/* ---- toast 解锁提示（右下角堆叠） ---- */
.ach-toast-stack {
  position: fixed;
  right: 16px;
  bottom: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
  pointer-events: none;
}
.ach-toast {
  min-width: 220px;
  max-width: 300px;
  padding: 12px 14px;
  border-radius: 12px;
  background: var(--surface, #ffffff);
  border: 1px solid var(--line, #d7e1e3);
  border-left: 4px solid var(--accent, #3b82f6);
  box-shadow: 0 6px 20px rgba(15, 30, 40, 0.12);
  animation: ach-toast-in 0.25s ease-out;
}
.ach-toast-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent-dark, #2563eb);
  font-weight: 600;
}
.ach-toast-name {
  margin-top: 4px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text, #152529);
}
.ach-toast-desc {
  margin-top: 2px;
  font-size: 12px;
  color: var(--muted, #66777d);
}
@keyframes ach-toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- 奖杯进度条（在任意位置放 [data-ach-progress] 的轨道即可） ---- */
.ach-progress-track {
  height: 8px;
  border-radius: 999px;
  background: var(--surface-strong, #eef4f5);
  overflow: hidden;
}
.ach-progress-track > [data-ach-progress] {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: var(--accent, #3b82f6);
  transition: width 0.3s ease;
}

/* ---- 成就清单行（奖杯弹窗内） ---- */
.ach-row {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--line, #d7e1e3);
  background: var(--surface, #ffffff);
  opacity: 0.55;
}
.ach-row.is-unlocked { opacity: 1; border-color: var(--accent-soft, #dbeafe); }
.ach-row .ach-icon { font-size: 22px; text-align: center; }
.ach-row .ach-name { font-weight: 600; color: var(--text, #152529); }
.ach-row .ach-desc { font-size: 12px; color: var(--muted, #66777d); }
.ach-row .ach-status {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted, #66777d);
  white-space: nowrap;
}
.ach-row.is-unlocked .ach-status { color: var(--accent-dark, #2563eb); }

/* 触控目标：奖杯入口按钮不小于 40px */
.ach-trophy-btn {
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid var(--line, #d7e1e3);
  background: var(--surface, #ffffff);
  color: var(--text, #152529);
  cursor: pointer;
}

</style>
</head>
<body>
<div class="app-wrap">
  <div id="map-view"></div>
  <div id="session-view" style="display:none"></div>
  <div id="mistakes-view" style="display:none"></div>
</div>

<script>
/**
 * fraction-engine.js — 精确有理数运算核 + step-trace（UMD）
 * 计算训练基座 · M0。所有运算返回 { value, trace }，trace 供解析面板逐步渲染。
 * Frac = { n: int, d: int>0 }，符号在 n；运算结果恒为最简分数。
 */
(function (root, factory) {
  if (typeof module === "object" && module.exports) module.exports = factory();
  else root.FractionEngine = factory();
})(typeof self !== "undefined" ? self : this, function () {
  "use strict";

  // 分量上界取 sqrt(MAX_SAFE_INTEGER)，保证 equals/compare 的交叉相乘不丢精度
  var MAX_COMPONENT = 94906265;

  function assertInt(x, name) {
    if (typeof x !== "number" || !Number.isInteger(x)) {
      throw new TypeError(name + " must be an integer, got " + x);
    }
  }

  function guard(n, d) {
    if (Math.abs(n) > MAX_COMPONENT || d > MAX_COMPONENT) {
      throw new RangeError("fraction component overflow: " + n + "/" + d);
    }
  }

  function gcd(a, b) {
    a = Math.abs(a);
    b = Math.abs(b);
    while (b) {
      var t = a % b;
      a = b;
      b = t;
    }
    return a;
  }

  function lcm(a, b) {
    if (a === 0 || b === 0) return 0;
    return Math.abs((a / gcd(a, b)) * b);
  }

  function frac(n, d) {
    assertInt(n, "numerator");
    assertInt(d, "denominator");
    if (d === 0) throw new RangeError("denominator must not be 0");
    if (d < 0) {
      n = -n;
      d = -d;
    }
    guard(n, d);
    return { n: n, d: d };

  function num(k) {
    return frac(k, 1);
  }

  function simplify(f) {
    if (f.n === 0) return { n: 0, d: 1 };

    return { n: f.n / g, d: f.d / g };
  }

  function isSimplified(n, d) {
    if (d === 0) return false;
    if (n === 0) return Math.abs(d) === 1;
    return gcd(n, d) === 1;
  }

  function equals(a, b) {
    return a.n * b.d === b.n * a.d;
  }

  function compare(a, b) {
    var x = a.n * b.d;
    var y = b.n * a.d;
    return x < y ? -1 : x > y ? 1 : 0;
  }

  function toString(f) {
    return f.d === 1 ? String(f.n) : f.n + "/" + f.d;
  }

  // ---- 带分数 ----
  // 返回 { sign, w, n, d }：sign ∈ {1,-1}，w、n ≥ 0
  function toMixed(f) {
    var sign = f.n < 0 ? -1 : 1;
    var an = Math.abs(f.n);
    return { sign: sign, w: Math.floor(an / f.d), n: an % f.d, d: f.d };

  function fromMixed(w, n, d, sign) {
    assertInt(w, "whole");
    assertInt(n, "numerator");

    var f = frac(w * d + n, d);
    if (sign === -1) f = { n: -f.n, d: f.d };

  }

  // ---- 加减（共用内核）----
  function addSub(a, b, isAdd) {
    var trace = [];
    var raw;
    var opName = isAdd ? "add" : "sub";
    var apply = function (x, y) {
      return isAdd ? x + y : x - y;
    };
    if (a.d === b.d) {
      raw = frac(apply(a.n, b.n), a.d);
      trace.push({
        op: opName + "_same_den",
        meta: { d: a.d, n1: a.n, n2: b.n, resultN: raw.n },

      if (k2 !== 1) trace.push({ op: "expand", meta: { from: b, to: frac(b.n * k2, L), k: k2 } });

        op: opName + "_same_den",

  }

  function add(a, b) {
    return addSub(a, b, true);
  }

  function sub(a, b) {
    return addSub(a, b, false);
  }

  // ---- 乘法（先交叉约分，再分子乘分子、分母乘分母）----
  function mul(a, b) {
    var trace = [];
    var g1 = gcd(a.n, b.d);
    var g2 = gcd(b.n, a.d);
    var an = a.n, ad = a.d, bn = b.n, bd = b.d;
    if (g1 > 1) {
      an = a.n / g1;
      bd = b.d / g1;
      trace.push({ op: "cross_cancel", meta: { g: g1, pair: "n1_d2", from: [a.n, b.d], to: [an, bd] } });
    }
    if (g2 > 1) {
      bn = b.n / g2;
      ad = a.d / g2;
      trace.push({ op: "cross_cancel", meta: { g: g2, pair: "n2_d1", from: [b.n, a.d], to: [bn, ad] } });
    }
    var raw = frac(an * bn, ad * bd);
    trace.push({ op: "mul_num", meta: { n1: an, n2: bn, d1: ad, d2: bd, result: raw } });
    var s = simplify(raw);
    if (s.n !== raw.n || s.d !== raw.d) {
      trace.push({ op: "simplify", meta: { g: gcd(raw.n, raw.d), from: raw, to: s } });
    }
    return { value: s, trace: trace };
  }

  // ---- 除法（乘以倒数）----
  function div(a, b) {
    if (b.n === 0) throw new RangeError("division by zero fraction");
    var inv = frac(b.d, b.n);
    var trace = [{ op: "invert", meta: { from: b, to: inv } }];
    var m = mul(a, inv);
    return { value: m.value, trace: trace.concat(m.trace) };
  }

  // ---- 带分数减法「借 1」视角（解析层用；计算恒走假分数通路自证一致）----
  function mixedSubView(a, b) {
    if (a.n < 0 || b.n < 0) throw new RangeError("mixedSubView expects non-negative fractions");
    if (compare(a, b) < 0) throw new RangeError("mixedSubView expects a >= b");
    var ma = toMixed(a);
    var mb = toMixed(b);
    var L = lcm(a.d, b.d);
    var na = ma.n * (L / a.d);
    var nb = mb.n * (L / b.d);
    var trace = [{ op: "mixed_common_den", meta: { lcm: L, aFracN: na, bFracN: nb } }];
    var w = ma.w;
    var borrow = false;
    if (na < nb) {
      borrow = true;
      w -= 1;
      na += L;
      trace.push({ op: "borrow_one", meta: { fromWhole: ma.w, fracBecomes: na + "/" + L } });
    }
    var fracPart = simplify(frac(na - nb, L));
    var wholePart = w - mb.w;
    trace.push({
      op: "mixed_sub",
      meta: { whole: wholePart, fracN: na - nb, fracD: L, simplified: fracPart },

  }

  // ---- 表达式树求值 ----
  // node: { t:'f', v:{n,d} } | { t:'bin', op:'+'|'-'|'*'|'/', l, r }
  var OP_FN = { "+": add, "-": sub, "*": mul, "/": div };

  function evalExpr(node) {
    var steps = [];
    function ev(nd) {
      if (nd.t === "f") return frac(nd.v.n, nd.v.d);
      if (nd.t !== "bin" || !OP_FN[nd.op]) throw new TypeError("bad expr node: " + JSON.stringify(nd));
      var A = ev(nd.l);
      var B = ev(nd.r);
      var r = OP_FN[nd.op](A, B);
      steps.push({ op: "binop", operator: nd.op, a: A, b: B, result: r.value, trace: r.trace });
      return r.value;
    }
    return { value: ev(node), steps: steps };
  }

  // AST 构造便捷函数（M2 出题器使用）
  function fNode(n, d) {
    return { t: "f", v: { n: n, d: d === undefined ? 1 : d } };
  }

  function bin(op, l, r) {
    return { t: "bin", op: op, l: l, r: r };
  }

  return {
    MAX_COMPONENT: MAX_COMPONENT,
    gcd: gcd,
    lcm: lcm,
    frac: frac,
    num: num,
    simplify: simplify,
    isSimplified: isSimplified,
    equals: equals,
    compare: compare,
    toString: toString,
    toMixed: toMixed,
    fromMixed: fromMixed,
    add: add,
    sub: sub,
    mul: mul,
    div: div,
    mixedSubView: mixedSubView,
    evalExpr: evalExpr,
    fNode: fNode,
    bin: bin,
  };
});

<script>
/**
 * problem-gen.js — 分数内容包出题器（UMD）· M2
 * L1 同分母加减 / L2 异分母加减 / L3 带分数加减 / L4 乘法 / L5 除法 / L6 四则混合
 * 每关三档（1 入门 / 2 熟练 / 3 挑战）。
 * 核心承诺：每道题生成后由引擎独立求解自证（validateProblem），
 * 且全程无负数中间量、操作数均为最简分数、答案分量有界。
 */
(function (root, factory) {

})(typeof self !== "undefined" ? self : this, function (E) {
  "use strict";

  var bin = E.bin;

  // ---------- 可复现随机 ----------

    var h = 2166136261;

    var s = hashSeed(seed);

      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }

      next: next,
      int: function (lo, hi) {
        return lo + Math.floor(next() * (hi - lo + 1));
      },
      pick: function (arr) {
        return arr[Math.floor(next() * arr.length)];
      },
      chance: function (p) {

      },

  }

  // ---------- AST 工具 ----------
  function leavesOf(node, out) {
    out = out || [];
    if (node.t === "f") out.push(node);
    else {
      leavesOf(node.l, out);
      leavesOf(node.r, out);
    }
    return out;
  }

  function opsOf(node, out) {
    out = out || [];
    if (node.t === "bin") {
      out.push(node.op);
      opsOf(node.l, out);
      opsOf(node.r, out);
    }
    return out;
  }

  var OP_TXT = { "+": " + ", "-": " − ", "*": " × ", "/": " ÷ " };
  var PREC = { "+": 1, "-": 1, "*": 2, "/": 2 };

  function fracText(node) {
    if (node.blank) return "▢";
    var n = node.v.n;
    var d = node.v.d === undefined ? 1 : node.v.d;
    if (d === 1) return String(n);
    if (node.display === "mixed" && Math.abs(n) > d) {
      var w = Math.floor(Math.abs(n) / d);
      var r = Math.abs(n) % d;
      var s = n < 0 ? "-" : "";
      return r === 0 ? s + w : s + w + " " + r + "/" + d;
    }
    return n + "/" + d;
  }

  function toText(node, parent, isRight) {
    if (node.t === "f") return fracText(node);
    var inner =
      toText(node.l, node, false) + OP_TXT[node.op] + toText(node.r, node, true);
    var paren =
      node.paren === true ||
      (parent &&
        (PREC[node.op] < PREC[parent.op] ||
          (isRight && PREC[node.op] === PREC[parent.op] && (parent.op === "-" || parent.op === "/"))));
    return paren ? "(" + inner + ")" : inner;
  }

  function answerText(frac) {
    if (frac.d === 1) return String(frac.n);
    if (Math.abs(frac.n) > frac.d) {
      var w = Math.floor(Math.abs(frac.n) / frac.d);
      var r = Math.abs(frac.n) % frac.d;
      return (frac.n < 0 ? "-" : "") + w + " " + r + "/" + frac.d + "（即 " + frac.n + "/" + frac.d + "）";
    }

  // ---------- 操作数构造 ----------

  }

  function properNode(rng, d) {

  }

  // ---------- 巧算策略（L7/L8 策略选择题） ----------

    factor: "提取公因数，先算括号里的和",
    split: "带分数拆成「整数 + 分数」分别除",
    whole_cancel: "观察分子是分母的几倍，整体约分",
    chain_cancel: "连锁约分：相邻分子分母互相消掉",

  function strategyFor(correctId, rng) {

    for (var i = others.length - 1; i > 0; i--) {

      var t = others[i];
      others[i] = others[j];
      others[j] = t;

    if (picked.indexOf("brute") < 0) picked[2] = "brute";
    var ids = picked.concat([correctId]);
    for (var m = ids.length - 1; m > 0; m--) {
      var n = Math.floor(rng.next() * (m + 1));
      var s = ids[m];
      ids[m] = ids[n];
      ids[n] = s;
    }
    return {
      question: "怎样算最巧？",
      options: ids.map(function (id) {
        return STRATEGIES[id];
      }),
      correctIndex: ids.indexOf(correctId),
      correctId: correctId,
    };
  }

  var COPRIME_PAIRS = [
    [2, 3], [2, 5], [2, 7], [2, 9], [3, 4], [3, 5], [3, 7], [3, 8], [3, 10],
    [4, 5], [4, 7], [4, 9], [5, 6], [5, 7], [5, 8], [5, 9], [7, 8], [7, 10], [7, 12], [5, 12],
  ];
  var GENERAL_PAIRS = [
    [4, 6], [6, 8], [6, 9], [8, 12], [9, 12], [10, 12], [6, 10], [10, 15], [12, 15], [8, 10], [12, 18], [14, 21], [15, 20],
  ];
  var MULTIPLE_BASES = [2, 3, 4, 5, 6];

  // ---------- 关卡生成器 ----------
  // 每个生成器返回 { ast, tags, answerDisplay }
  var GENERATORS = {
    L1: {
      1: function (rng) {
        var d = rng.pick([5, 7, 9, 10, 11]);
        var isAdd = rng.chance(0.5);
        var n1 = rng.int(1, d - 1);

          ast: bin(isAdd ? "+" : "-", f(n1, d), f(n2, d)),

      },
      2: function (rng) {

        var n2 = rng.int(1, d - 1);

          ast: bin(isAdd ? "+" : "-", f(n1, d), f(n2, d)),

          var b = properNode(rng, pair[1]);

          rng.chance(0.5) ? "-" : "+",

      2: function (rng) {

        var isAdd = rng.chance(0.5);

          ast: bin(isAdd ? "+" : "-", a, b),
          tags: ["mixed_number", "diff_den", isAdd ? "add" : "sub"],

        if (kind === "borrow_sub") {

          var b = mixedNode(rng, 1, 3, pair[1]);

          var ma = E.toMixed(a.v);
          var mb = E.toMixed(b.v);

        var d2 = rng.pick([3, 4, 6]);
        var d3 = rng.pick([8, 12, 24]);
        var a3 = mixedNode(rng, 6, 15, d1);
        var b3 = mixedNode(rng, 1, 6, d2);
        var c3 = mixedNode(rng, 1, 4, d3);
        return {
          ast: bin("-", bin("-", a3, b3), c3),
          tags: ["mixed_number", "three_terms", "mixed_borrow"],
          answerDisplay: "mixed",
        };
      },
    },

    L4: {
      1: function (rng) {
        if (rng.chance(0.3)) {
          // 整数 × 真分数（构造可约）
          var d = rng.pick([4, 6, 8, 9, 10, 12]);
          var p = properFrac(rng, d);
          var k = rng.int(2, 12);
          if (E.gcd(k, d) === 1) return null; // 要求能约分
          return {
            ast: rng.chance(0.5) ? bin("*", f(k), f(p.n, p.d)) : bin("*", f(p.n, p.d), f(k)),
            tags: ["mul", "int_times_frac", "cross_cancel"],
            answerDisplay: "auto",
          };
        }
        var a = properNode(rng, rng.pick([4, 6, 8, 9, 10, 12]));
        var b = properNode(rng, rng.pick([3, 5, 6, 7, 9, 10]));
        // 要求至少一处交叉约分，避免死算
        if (E.gcd(a.v.n, b.v.d) === 1 && E.gcd(b.v.n, a.v.d) === 1) return null;
        return { ast: bin("*", a, b), tags: ["mul", "cross_cancel"], answerDisplay: "improper" };
      },
      2: function (rng) {
        var m = mixedNode(rng, 1, 5, rng.pick([3, 5, 7, 4]));
        var other = rng.chance(0.5)
          ? properNode(rng, rng.pick([4, 6, 8, 9]))
          : f(rng.int(2, 9));
        var swap = rng.chance(0.5);
        return {
          ast: bin("*", swap ? other : m, swap ? m : other),
          tags: ["mul", "mixed_to_improper"],
          answerDisplay: "auto",
        };
      },
      3: function (rng) {
        if (rng.chance(0.5)) {
          var m1 = mixedNode(rng, 1, 4, rng.pick([3, 5, 7]));
          var m2 = mixedNode(rng, 1, 4, rng.pick([4, 7, 11, 5]));
          return { ast: bin("*", m1, m2), tags: ["mul", "mixed_times_mixed"], answerDisplay: "auto" };
        }
        var a = properNode(rng, rng.pick([4, 6, 8, 9]));
        var b = properNode(rng, rng.pick([3, 5, 7, 10]));
        var c = properNode(rng, rng.pick([2, 3, 4, 6]));
        return { ast: bin("*", bin("*", a, b), c), tags: ["mul", "three_factors"], answerDisplay: "improper" };
      },
    },

    L5: {
      1: function (rng) {
        var a = properNode(rng, rng.pick([4, 6, 7, 8, 9, 12, 14, 15]));
        var b = properNode(rng, rng.pick([3, 5, 7, 11, 16, 21]));
        return { ast: bin("/", a, b), tags: ["div", "invert"], answerDisplay: "auto" };
      },
      2: function (rng) {
        var kind = rng.pick(["mixed_div_frac", "frac_div_int", "int_div_frac"]);
        if (kind === "mixed_div_frac") {
          var m = mixedNode(rng, 1, 4, rng.pick([6, 7, 5, 3]));
          var b = properNode(rng, rng.pick([5, 7, 11, 4]));
          return { ast: bin("/", m, b), tags: ["div", "mixed_to_improper", "invert"], answerDisplay: "auto" };
        }
        if (kind === "frac_div_int") {
          var a = properNode(rng, rng.pick([5, 7, 8, 9, 12]));
          return { ast: bin("/", a, f(rng.int(2, 9))), tags: ["div", "div_by_int"], answerDisplay: "improper" };
        }
        var d = rng.pick([4, 5, 6, 8, 10]);
        var p = properFrac(rng, d);
        var k = rng.int(2, 12);
        return { ast: bin("/", f(k), f(p.n, p.d)), tags: ["div", "int_div_frac"], answerDisplay: "auto" };
      },
      3: function (rng) {
        var a = properNode(rng, rng.pick([4, 6, 8, 14]));
        var b = properNode(rng, rng.pick([16, 7, 9, 15]));
        var c = properNode(rng, rng.pick([5, 6, 7, 16]));
        var ast = rng.chance(0.5)
          ? bin("/", bin("/", a, b), c)
          : bin("*", bin("/", a, b), c);
        return { ast: ast, tags: ["div", "chain"], answerDisplay: "auto" };
      },
    },

    L6: {
      1: function (rng) {
        // a ± b×c：先乘后加减
        var b = properNode(rng, rng.pick([3, 4, 6, 8]));
        var c = properNode(rng, rng.pick([2, 3, 4, 5]));
        var a = properNode(rng, rng.pick([2, 3, 4, 6, 8, 12]));
        var isAdd = rng.chance(0.5);
        return {
          ast: bin(isAdd ? "+" : "-", a, bin("*", b, c)),
          tags: ["mixed_ops", "order_of_operations"],
          answerDisplay: "auto",
        };
      },
      2: function (rng) {
        var kind = rng.pick(["paren_mul", "paren_div", "sub_div"]);
        var a = properNode(rng, rng.pick([3, 4, 6, 8, 12]));
        var b = properNode(rng, rng.pick([2, 3, 4, 6])); // 与 a 异分母更常见
        if (kind === "paren_mul") {
          var c = properNode(rng, rng.pick([2, 3, 5, 6]));
          return {
            ast: bin("*", bin(rng.chance(0.5) ? "+" : "-", a, b), c),
            tags: ["mixed_ops", "paren"],
            answerDisplay: "auto",
          };
        }
        if (kind === "paren_div") {
          var c2 = properNode(rng, rng.pick([2, 3, 4, 5]));
          return {
            ast: bin("/", bin(rng.chance(0.5) ? "+" : "-", a, b), c2),
            tags: ["mixed_ops", "paren", "div"],
            answerDisplay: "auto",
          };
        }
        var c3 = properNode(rng, rng.pick([2, 3, 4]));
        return {
          ast: bin(rng.chance(0.5) ? "+" : "-", a, bin("/", b, c3)),
          tags: ["mixed_ops", "order_of_operations", "div"],
          answerDisplay: "auto",
        };
      },
      3: function (rng) {
        var kind = rng.pick(["mixed_three", "mul_add_div"]);
        if (kind === "mixed_three") {
          var m1 = mixedNode(rng, 5, 15, rng.pick([12, 8, 6]));
          var m2 = mixedNode(rng, 1, 5, rng.pick([3, 4, 6]));
          var m3 = mixedNode(rng, 1, 4, rng.pick([8, 12, 4]));
          var ast = rng.chance(0.5)
            ? bin("-", bin("-", m1, m2), m3)
            : bin("+", m1, bin("-", m2, m3));
          return { ast: ast, tags: ["mixed_ops", "mixed_number", "three_terms"], answerDisplay: "mixed" };
        }
        var a = properNode(rng, rng.pick([4, 6, 8]));
        var b = properNode(rng, rng.pick([3, 5, 7]));
        var c = properNode(rng, rng.pick([2, 3, 4]));
        var dd = properNode(rng, rng.pick([5, 6, 8]));
        return {
          ast: bin("+", bin("*", a, b), bin("/", c, dd)),
          tags: ["mixed_ops", "order_of_operations", "four_terms"],
          answerDisplay: "auto",
        };
      },
    },
  };

  // ---------- 巧算关 ----------
  GENERATORS.L7 = {
    // T1 提公因数（公因数直接可见）：k×x1 + k×x2 ± k×x3
    1: function (rng) {
      var q = rng.pick([5, 7, 9, 11, 13]);
      var p = rng.int(1, q - 1);
      if (E.gcd(p, q) !== 1) return null;
      var c = rng.pick([4, 5, 6, 8, 9]);
      var minus = rng.chance(0.4);
      var a1 = rng.int(1, c - 1);
      var a2 = rng.int(1, c - 1);
      var target = c * rng.pick([1, 2]); // 括号和 = 1 或 2
      var a3 = minus ? a1 + a2 - target : target - a1 - a2;
      if (a3 < 1 || a3 > c - 1) return null; // 操作数保持真分数
      if (a1 === a2 && a2 === a3) return null; // 三项全同像假题
      var k = function () {
        return f(p, q);
      };
      var t1 = bin("*", k(), f(a1, c));
      var t2 = bin("*", k(), f(a2, c));
      var t3 = bin("*", k(), f(a3, c));
      var ast = minus ? bin("-", bin("+", t1, t2), t3) : bin("+", bin("+", t1, t2), t3);
      return { ast: ast, tags: ["smart", "smart_factor"], answerDisplay: "auto", strategyId: "factor" };
    },
    // T2 拆数构造：(pt ± p/q) ÷ p/q = qt ± 1
    2: function (rng) {
      var q = rng.pick([4, 5, 6, 7, 8, 9]);
      var p = rng.int(2, q - 1);
      if (E.gcd(p, q) !== 1) return null;
      var t = rng.int(5, 15);
      var minus = rng.chance(0.35);
      var whole = p * t;
      var lead;
      if (minus) {
        // (pt − p/q) 不是规范带分数，用括号表达式呈现
        lead = bin("-", f(whole), f(p, q));
      } else {
        lead = { t: "f", v: E.fromMixed(whole, p, q), display: "mixed" };
      }
      var ast = bin("/", lead, f(p, q));
      return { ast: ast, tags: ["smart", "smart_split"], answerDisplay: "auto", strategyId: "split" };
    },
    // T3 隐藏公因数（讲义例5 结构：(p/di)×(bi/q)，公因数 p/q 藏在乘积里）
    3: function (rng) {
      if (rng.chance(0.45)) {
        var g2 = GENERATORS.L7[2](rng);
        return g2;
      }
      var q = rng.pick([7, 11, 13]);
      var p = rng.int(2, 6);
      if (E.gcd(p, q) !== 1) return null;
      var dens = [rng.pick([4, 6, 8]), rng.pick([3, 9, 12]), rng.pick([6, 12, 18])];
      var terms = [];
      for (var i = 0; i < 3; i++) {
        if (p >= dens[i]) return null; // 因子保持真分数（讲义例5 风格）
        var b = rng.int(1, Math.min(dens[i] - 1, q - 1));
        terms.push(bin("*", f(p, dens[i]), f(b, q)));
      }
      var ast = bin("+", bin("+", terms[0], terms[1]), terms[2]);
      // 隐藏公因数型要求括号和干净：答案分母过大说明凑不出巧算感，弃用
      try {
        if (E.evalExpr(ast).value.d > 40) return null;
      } catch (e) {
        return null;
      }
      return { ast: ast, tags: ["smart", "smart_factor", "hidden_factor"], answerDisplay: "auto", strategyId: "factor" };
    },
  };

  GENERATORS.L8 = {
    // T1 连锁约分：从 (1±1/m) 连乘到 (1±1/n)
    //  minus 型 = (m−1)/n；plus 型 = (n+1)/m；minus_times 型（尾乘 n 收整）= m−1
    1: function (rng) {
      var m = rng.pick([2, 3]);
      var n = rng.int(m + 3, 10);
      var type = rng.pick(["minus", "plus", "minus_times"]);
      var ast = null;
      for (var k = m; k <= n; k++) {
        var term = bin(type === "plus" ? "+" : "-", f(1), f(1, k));
        term.paren = true;
        ast = ast ? bin("*", ast, term) : term;
      }
      if (type === "minus_times") {
        if (m === 2) return null; // 答案恒为 1，太平淡
        ast = bin("*", ast, f(n));
      }
      return { ast: ast, tags: ["smart", "smart_chain"], answerDisplay: "auto", strategyId: "chain_cancel" };
    },
    // T2 整体约分：(k·f1 + k·f2 − k·f3) ÷ (f1 + f2 − f3) = k
    2: function (rng) {
      var k = rng.pick([2, 3, 4]);
      var d1 = rng.pick([9, 7, 5]);
      var d2 = rng.pick([13, 11, 8]);
      var d3 = rng.pick([11, 12, 6]);
      if (d1 === d2 || d2 === d3 || d1 === d3) return null;
      var f1 = properFrac(rng, d1);
      var f2 = properFrac(rng, d2);
      var f3 = properFrac(rng, d3);
      var s = E.sub(E.add(E.frac(f1.n, f1.d), E.frac(f2.n, f2.d)).value, E.frac(f3.n, f3.d)).value;
      if (s.n <= 0) return null;
      function big(fr) {
        var v = E.mul(E.num(k), E.frac(fr.n, fr.d)).value;
        return { t: "f", v: v, display: "mixed" };
      }
      var up = bin("-", bin("+", big(f1), big(f2)), big(f3));
      var down = bin("-", bin("+", f(f1.n, f1.d), f(f2.n, f2.d)), f(f3.n, f3.d));
      return { ast: bin("/", up, down), tags: ["smart", "smart_whole_cancel"], answerDisplay: "auto", strategyId: "whole_cancel" };
    },
    // T3 换元：a×(1+b) − (1+a)×b = a − b
    3: function (rng) {
      var da = rng.pick([4, 5, 7, 9, 8]);
      var db = rng.pick([3, 5, 6, 7, 11]);
      if (da === db) return null;
      var a = properFrac(rng, da);
      var b = properFrac(rng, db);
      if (E.compare(E.frac(a.n, a.d), E.frac(b.n, b.d)) <= 0) return null; // 保证 a>b，答案为正
      var onePlusB = bin("+", f(1), f(b.n, b.d));
      onePlusB.paren = true;
      var onePlusA = bin("+", f(1), f(a.n, a.d));
      onePlusA.paren = true;
      var ast = bin("-", bin("*", f(a.n, a.d), onePlusB), bin("*", onePlusA, f(b.n, b.d)));
      return { ast: ast, tags: ["smart", "smart_substitute"], answerDisplay: "auto", strategyId: "substitute" };
    },
  };

  var LEVEL_META = {
    L1: { name: "同分母加减", missingShare: 0.25, caps: { den: 24, num: 60 } },
    L2: { name: "异分母加减", missingShare: 0.2, caps: { den: 120, num: 300 } },
    L3: { name: "带分数加减", missingShare: 0.1, caps: { den: 120, num: 4000 } },
    L4: { name: "分数乘法", missingShare: 0.15, caps: { den: 200, num: 2000 } },
    L5: { name: "分数除法", missingShare: 0.15, caps: { den: 200, num: 2000 } },
    L6: { name: "四则混合", missingShare: 0, caps: { den: 240, num: 4000 } },
    L7: { name: "巧算·提公因数", missingShare: 0, caps: { den: 400, num: 4000 } },
    L8: { name: "巧算·高手殿堂", missingShare: 0, caps: { den: 400, num: 4000 } },
  };

  // ---------- 约束检查 ----------
  function checkNonNegative(ast, ev) {
    var lv = leavesOf(ast);
    for (var i = 0; i < lv.length; i++) {
      if (lv[i].v.n < 0) return false;
    }
    for (var j = 0; j < ev.steps.length; j++) {
      // 中间量必须严格为正：负数超纲，0 会产生退化题（如 2/8 − 2/8 + 5/8）
      if (ev.steps[j].result.n <= 0) return false;
    }
    return true;
  }

  function buildBase(levelId, tier, rng) {
    var gen = GENERATORS[levelId] && GENERATORS[levelId][tier];
    if (!gen) throw new Error("unknown level/tier: " + levelId + "/" + tier);
    var caps = LEVEL_META[levelId].caps;
    for (var i = 0; i < 400; i++) {
      var base = gen(rng);
      if (!base) continue;
      var ev;
      try {
        ev = E.evalExpr(base.ast);
      } catch (e) {
        continue; // 溢出等，重来
      }
      if (!checkNonNegative(base.ast, ev)) continue;
      if (ev.value.n === 0) continue; // 答案为 0 的题无聊且易歧义
      if (ev.value.d > caps.den || Math.abs(ev.value.n) > caps.num) continue;
      base.answer = ev.value;
      return base;
    }
    throw new Error("cannot generate valid problem for " + levelId + " tier " + tier);
  }

  // 把一道 fill_result 转成缺项题：挖掉一个叶子
  function toMissing(base, rng) {
    var lv = leavesOf(base.ast).filter(function (leaf) {
      return leaf.v.d > 1; // 只挖分数叶，避免挖掉整数系数出现多解歧义
    });
    if (lv.length === 0) return null;
    var target = rng.pick(lv);
    var missingValue = E.frac(target.v.n, target.v.d);
    target.blank = true;
    return {
      ast: base.ast,
      target: base.answer,
      answer: E.simplify(missingValue),
      tags: base.tags.concat(["missing_operand"]),
      answerDisplay: "improper",
    };
  }

  // ---------- 自证校验 ----------
  function substituteBlank(node, value) {
    if (node.t === "f") {
      if (node.blank) return { t: "f", v: { n: value.n, d: value.d } };
      return node;
    }
    return { t: "bin", op: node.op, l: substituteBlank(node.l, value), r: substituteBlank(node.r, value), paren: node.paren };
  }

  function validateProblem(p) {
    if (!E.isSimplified(p.answer.n, p.answer.d)) {
      throw new Error("answer not simplified: " + JSON.stringify(p.answer));
    }
    if (p.format === "fill_result") {
      var ev = E.evalExpr(p.ast);
      if (!E.equals(ev.value, p.answer)) throw new Error("self-check failed: " + p.text);
    } else if (p.format === "fill_missing") {
      var ast2 = substituteBlank(p.ast, p.answer);
      var ev2 = E.evalExpr(ast2);
      if (!E.equals(ev2.value, p.target)) throw new Error("missing self-check failed: " + p.text);
    } else {
      throw new Error("unknown format: " + p.format);
    }
    return true;
  }

  // ---------- 对外接口 ----------
  function generateProblem(opts) {
    var levelId = opts.levelId;
    var tier = opts.tier;
    var rng = opts.rng || makeRng(opts.seed || String(Date.now()));
    var wantMissing = opts.format === "fill_missing";
    var base = buildBase(levelId, tier, rng);
    var format = "fill_result";
    var target = null;
    var answer = base.answer;
    var tags = base.tags;
    var answerDisplay = base.answerDisplay;

    if (wantMissing) {
      var m = toMissing(base, rng);
      if (m) {
        format = "fill_missing";
        target = m.target;
        answer = m.answer;
        tags = m.tags;
        answerDisplay = m.answerDisplay;
      }
    }

    var p = {
      id: levelId + "-T" + tier + "-" + Math.floor(rng.next() * 1e9).toString(36),
      levelId: levelId,
      tier: tier,
      mode: opts.mode || "practice",
      format: format,
      ast: base.ast,
      target: target,
      answer: answer,
      answerDisplay: answerDisplay,
      abilityTags: tags,
      difficulty: tier,
      strategy: base.strategyId ? strategyFor(base.strategyId, rng) : null,
      text: toText(base.ast) + " = " + (format === "fill_missing" ? answerText(target) : "▢"),
    };
    validateProblem(p);
    return p;
  }

  function generateSession(opts) {
    var count = opts.count;
    if (!count || count <= 0) throw new Error("count must be positive");
    var rng = makeRng(opts.seed || String(Date.now()));
    var missingShare = opts.missingShare !== undefined ? opts.missingShare : LEVEL_META[opts.levelId].missingShare;
    if (opts.mode === "challenge" || opts.mode === "assessment") missingShare = Math.min(missingShare, 0.1);
    var problems = [];
    var seen = {};
    var attempts = 0;
    while (problems.length < count && attempts < count * 60) {
      attempts++;
      var p = generateProblem({
        levelId: opts.levelId,
        tier: opts.tier,
        mode: opts.mode,
        rng: rng,
        format: rng.chance(missingShare) ? "fill_missing" : "fill_result",
      });
      var key = p.format + "|" + p.text;
      if (seen[key]) continue;
      seen[key] = true;
      problems.push(p);
    }
    if (problems.length < count) {
      throw new Error("only generated " + problems.length + "/" + count + " for " + opts.levelId + " T" + opts.tier);
    }
    return problems;
  }

  return {
    makeRng: makeRng,
    toText: toText,
    answerText: answerText,
    leavesOf: leavesOf,
    opsOf: opsOf,
    substituteBlank: substituteBlank,
    validateProblem: validateProblem,
    generateProblem: generateProblem,
    generateSession: generateSession,
    LEVEL_META: LEVEL_META,
  };
});

</script>
<script>
/**
 * checker.js — 判题与错因诊断（UMD）· M3
 * 三值判定：correct / unsimplified（等值但未化简或形式不规范，给「还差一步」出口）/ wrong。
 * wrong 时尝试匹配常见错误模型，产出 errorTag 进错题本。
 */
(function (root, factory) {
  if (typeof module === "object" && module.exports) {
    module.exports = factory(require("./fraction-engine.js"), require("./problem-gen.js"));
  } else {
    root.Checker = factory(root.FractionEngine, root.ProblemGen);
  }
})(typeof self !== "undefined" ? self : this, function (E, G) {
  "use strict";

  /**
   * check(problem, kp)
   *  kp 来自 FracKeypad.getValue()：{ ok, frac, parts:{w,n,d}, isInteger }
   * 返回 { verdict, errorTag? , expected }
   */
  function check(problem, kp) {
    var expected = problem.answer;
    if (!kp || !kp.ok) return { verdict: "invalid", expected: expected };
    if (E.equals(kp.frac, expected)) {
      // 等值，再看形式是否规范：分数部分必须最简；带整数部分时分数部分必须是真分数
      var formOk = true;
      if (!kp.isInteger) {
        if (E.gcd(kp.parts.n, kp.parts.d) !== 1) formOk = false;
        if (kp.parts.w > 0 && kp.parts.n >= kp.parts.d) formOk = false;
      }
      return { verdict: formOk ? "correct" : "unsimplified", expected: expected };
    }
    return { verdict: "wrong", errorTag: diagnose(problem, kp.frac), expected: expected };
  }

  // ---------- 常见错误模型 ----------
  function diagnose(problem, wrong) {
    var candidates = buildErrorModels(problem);
    for (var i = 0; i < candidates.length; i++) {
      if (candidates[i].value && E.equals(wrong, candidates[i].value)) return candidates[i].tag;
    }
    return null;
  }

  function safeEval(ast) {
    try {
      return E.evalExpr(ast).value;
    } catch (e) {
      return null;
    }
  }

  // 从左到右无视优先级求值（「运算顺序错」模型）。
