<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>幻影堵车：没有事故为什么也会堵</title>
  <style>
/*
 * achievements.css —— 成就系统底座配套样式
 * 配合 achievements.js 使用；可整段内联进单 HTML。
 * 颜色沿用数学实验室型变量（品牌蓝 #3b82f6 / 浅色卡片），无变量时有兜底值。
 */

/* ---- toast 解锁提示（右下角堆叠） ---- */
.ach-toast-stack {
  position: fixed;
  right: 16px;
  bottom: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
  pointer-events: none;
}
.ach-toast {
  min-width: 220px;
  max-width: 300px;
  padding: 12px 14px;
  border-radius: 12px;
  background: var(--surface, #ffffff);
  border: 1px solid var(--line, #d7e1e3);
  border-left: 4px solid var(--accent, #3b82f6);
  box-shadow: 0 6px 20px rgba(15, 30, 40, 0.12);
  animation: ach-toast-in 0.25s ease-out;
}
.ach-toast-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent-dark, #2563eb);
  font-weight: 600;
}
.ach-toast-name {
  margin-top: 4px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text, #152529);
}
.ach-toast-desc {
  margin-top: 2px;
  font-size: 12px;
  color: var(--muted, #66777d);
}
@keyframes ach-toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- 奖杯进度条（在任意位置放 [data-ach-progress] 的轨道即可） ---- */
.ach-progress-track {
  height: 8px;
  border-radius: 999px;
  background: var(--surface-strong, #eef4f5);
  overflow: hidden;
}
.ach-progress-track > [data-ach-progress] {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: var(--accent, #3b82f6);
  transition: width 0.3s ease;
}

/* ---- 成就清单行（奖杯弹窗内） ---- */
.ach-row {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--line, #d7e1e3);
  background: var(--surface, #ffffff);
  opacity: 0.55;
}
.ach-row.is-unlocked { opacity: 1; border-color: var(--accent-soft, #dbeafe); }
.ach-row .ach-icon { font-size: 22px; text-align: center; }
.ach-row .ach-name { font-weight: 600; color: var(--text, #152529); }
.ach-row .ach-desc { font-size: 12px; color: var(--muted, #66777d); }
.ach-row .ach-status {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted, #66777d);
  white-space: nowrap;
}
.ach-row.is-unlocked .ach-status { color: var(--accent-dark, #2563eb); }

/* 触控目标：奖杯入口按钮不小于 40px */
.ach-trophy-btn {
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid var(--line, #d7e1e3);
  background: var(--surface, #ffffff);
  color: var(--text, #152529);
  cursor: pointer;
}

</style>
  <style>
:root {
  --bg: #f4f7f8;
  --surface: #ffffff;
  --surface-strong: #eef4f5;
  --line: #d7e1e3;
  --text: #152529;
  --muted: #66777d;
  --accent: #3b82f6;
  --accent-dark: #2563eb;
  --accent-soft: #dbeafe;
  --good: #15803d;
  --bad: #b91c1c;
  --task: #b45309;
  --task-soft: #fef3c7;
  --task-line: #f6d879;
  /* 车速色阶：停=红 → 慢=橙 → 快=绿 */
  --v-stop: #dc2626;
  --v-mid: #f59e0b;
  --v-fast: #16a34a;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
  color: var(--text);
  background: var(--bg);
}

button, select, input { font: inherit; }

.topbar {
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
}

.topbar h1 { margin: 2px 0; font-size: 22px; line-height: 1.2; }
.subtitle, .eyebrow { margin: 0; color: var(--muted); font-size: 13px; }
.eyebrow { color: var(--accent-dark); font-weight: 700; }

.layout {
  display: grid;
  gap: 16px;
  padding: 16px 24px;
  min-height: calc(100vh - 64px);
  grid-template-columns: 188px minmax(440px, 1fr) 300px;
  grid-template-rows: 1fr auto;
  grid-template-areas:
    "nav stage data"
    "prompt prompt prompt";
}

.panel-shell {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: 0 6px 22px rgba(20, 45, 55, 0.06);
}

.nav { grid-area: nav; padding: 14px; }
.stage { grid-area: stage; padding: 14px; min-width: 0; display: flex; flex-direction: column; }
.data { grid-area: data; padding: 14px; }
.prompt { grid-area: prompt; padding: 12px 16px; }

.nav h2, .data h2 {
  margin: 0 0 10px;
  font-size: 13px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 700;
}

.module-list { display: grid; gap: 8px; }

.module-card {
  width: 100%;
  text-align: left;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 11px;
  cursor: pointer;
}
.module-card strong { display: block; font-size: 14px; margin-bottom: 2px; }
.module-card span { display: block; font-size: 11.5px; color: var(--muted); line-height: 1.4; }
.module-card.active { border-color: var(--accent); background: var(--accent-soft); }
.module-card.done strong::after { content: " ✓"; color: var(--good); }

/* ===== 优化①：任务条置顶（参与感来自达标） ===== */
.objective-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--task-soft);
  border: 1px solid var(--task-line);
  border-radius: 9px;
  padding: 8px 12px;
  margin-bottom: 12px;
  min-height: 44px;
}
.objective-bar .obj-icon { font-size: 18px; }
.objective-bar .obj-text { font-size: 13px; color: #6b4a12; line-height: 1.4; flex: 1; }
.objective-bar .obj-text b { color: var(--task); }
.objective-bar .obj-progress {
  font-size: 13px;
  font-weight: 700;
  color: var(--task);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.objective-bar.met { background: #ecfdf5; border-color: #bbf7d0; }
.objective-bar.met .obj-text { color: #14532d; }
.objective-bar.met .obj-text b, .objective-bar.met .obj-progress { color: var(--good); }
.objective-bar.hidden { display: none; }

.stage-head {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: flex-start;
  margin-bottom: 10px;
}
.stage-head h2 { color: var(--text); font-size: 18px; margin: 0; }
.stage-head p { margin: 4px 0 0; color: var(--muted); line-height: 1.4; font-size: 13px; }

.toolbar {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
}

.btn, .toolbar button, .toolbar select, .phase-tabs button, .icon-btn {
  min-height: 38px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  padding: 7px 12px;
  cursor: pointer;
}
.toolbar label {
  min-height: 38px;
  display: flex;
  align-items: center;
  gap: 7px;
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12.5px;
  white-space: nowrap;
}
.toolbar label .val { font-weight: 700; color: var(--accent-dark); min-width: 26px; text-align: right; font-variant-numeric: tabular-nums; }
.toolbar input[type="range"] { width: 84px; accent-color: var(--accent); }

.btn.primary, .toolbar button.primary, .phase-tabs button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn.subtle, .toolbar button.subtle { background: var(--surface-strong); }
.toolbar button:disabled, .btn:disabled { opacity: 0.45; cursor: not-allowed; }

.stage-body {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 440px;
  background: #f8fafc;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}
canvas#mainCanvas { width: 100%; height: 100%; display: block; background: #fbfdfe; touch-action: none; }

.html-stage { width: 100%; height: 100%; overflow: auto; padding: 16px; }
.hidden { display: none !important; }

.canvas-hint {
  position: absolute;
  left: 10px;
  bottom: 10px;
  background: rgba(21,37,41,0.78);
  color: #fff;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 8px;
  pointer-events: none;
  max-width: calc(100% - 20px);
}
.canvas-hint.hidden { display: none; }

/* ===== 数据面板：实况读数 ===== */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.metric {
  background: var(--surface-strong);
  border-radius: 8px;
  padding: 7px 9px;
}
.metric span { display: block; font-size: 11px; color: var(--muted); }
.metric strong { display: block; font-size: 18px; font-variant-numeric: tabular-nums; margin-top: 2px; }

.legend { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 6px; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; }
.swatch { width: 13px; height: 13px; border-radius: 4px; border: 1px solid var(--line); }

/* ===== 优化③：数据面板里的迷你图（实时描点） ===== */
.mini-chart { margin-bottom: 12px; }
.mini-chart h3 { margin: 0 0 6px; font-size: 12px; color: var(--muted); font-weight: 700; }
.mini-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  background: #fbfdfe;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}
canvas#miniCanvas { width: 100%; height: 100%; display: block; }

.rule-card, .muted-box {
  border: 1px solid var(--line);
  background: var(--surface-strong);
  border-radius: 8px;
  padding: 11px;
  color: var(--muted);
  line-height: 1.5;
  font-size: 13px;
}
.rule-card { margin-bottom: 12px; }
.rule-card strong { color: var(--text); }
.rule-card.hidden { display: none; }

.conclusion-body { margin-top: 10px; }
.conclusion-body.hidden { display: none; }

/* ===== 底部探究栏：phase + 优化②猜想瘦身 chip ===== */
.prompt-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.phase-tabs { display: flex; gap: 8px; }
.phase-tabs button { padding: 6px 14px; min-height: 36px; }
.prompt #promptText { margin: 8px 0 0; color: var(--text); line-height: 1.55; font-size: 13.5px; }

.predict-chip {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-soft);
  border: 1px solid #bfdbfe;
  border-radius: 999px;
  padding: 5px 8px 5px 12px;
  font-size: 12.5px;
  color: var(--accent-dark);
}
.predict-chip.hidden { display: none; }
.predict-chip .pc-q { font-weight: 600; }
.predict-chip .pc-opt {
  min-height: 30px;
  border: 1px solid var(--accent);
  background: var(--surface);
  color: var(--accent-dark);
  border-radius: 999px;
  padding: 3px 12px;
  cursor: pointer;
  font-weight: 700;
}
.predict-chip .pc-opt:hover { background: var(--accent); color: #fff; }
.predict-chip.answered { background: #ecfdf5; border-color: #bbf7d0; color: var(--good); }

/* ===== M0 / M5 卡片 ===== */
.intro-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
.intro-card, .quiz-card, .transfer-card {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--surface);
  padding: 13px;
}
.intro-card h3, .quiz-card h3, .transfer-card h3 { margin: 0 0 7px; font-size: 15px; }
.intro-card p, .quiz-card p, .transfer-card p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 13px; }
.intro-card .tag, .transfer-card .tag {
  display: inline-block; margin-top: 8px; font-size: 11px; color: var(--accent-dark);
  background: var(--accent-soft); border-radius: 6px; padding: 2px 8px;
}
.micro-demo { margin-top: 12px; }
.micro-strip { width: 100%; height: 56px; display: block; background: #fbfdfe; border: 1px solid var(--line); border-radius: 8px; }
.micro-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

.quiz-opts { display: grid; gap: 7px; margin-top: 9px; }
.quiz-opt {
  text-align: left; border: 1px solid var(--line); background: var(--surface);
  border-radius: 8px; padding: 8px 11px; cursor: pointer; font-size: 13px;
}
.quiz-opt:hover { border-color: var(--accent); }
.quiz-opt.correct { background: #ecfdf5; border-color: #bbf7d0; }
.quiz-opt.wrong { background: #fef2f2; border-color: #fecaca; }
.quiz-feedback { margin-top: 8px; font-size: 12.5px; color: var(--muted); min-height: 18px; }

/* ===== 成就弹窗 ===== */
.modal-bg {
  position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
  background: rgba(21, 37, 41, 0.38); z-index: 30; padding: 18px;
}
.modal-bg.open { display: flex; }
.modal {
  width: min(640px, 100%); max-height: min(700px, 92vh); overflow: auto;
  background: var(--surface); border-radius: 12px; border: 1px solid var(--line); padding: 18px;
}
.modal-head { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
.modal-head h2 { margin: 0; }
.icon-btn { width: 38px; padding: 0; }
.ach-progress-track { margin: 14px 0; }
.ach-list { display: grid; gap: 8px; margin-top: 4px; }
.modal-actions { margin-top: 14px; display: flex; justify-content: flex-end; }

@media (max-width: 1200px) {
  .layout {
    grid-template-columns: 176px minmax(0, 1fr);
    grid-template-areas:
      "nav stage"
      "data data"
      "prompt prompt";
  }
  .metrics { grid-template-columns: repeat(4, minmax(0,1fr)); }
  .mini-wrap { aspect-ratio: 24 / 7; }
  .legend { grid-template-columns: repeat(4, minmax(0,1fr)); }
}

@media (max-width: 760px) {
  .topbar { padding: 12px 14px; }
  .layout {
    padding: 12px;
    grid-template-columns: minmax(0, 1fr);
    grid-template-areas: "nav" "stage" "data" "prompt";
  }
  .module-list { grid-auto-flow: column; grid-auto-columns: minmax(150px, 1fr); overflow-x: auto; padding-bottom: 4px; }
  .stage-head { display: block; }
  .toolbar { justify-content: flex-start; margin-top: 10px; }
  .toolbar label { width: 100%; justify-content: space-between; }
  .toolbar input[type="range"] { width: min(180px, 45vw); }
  .stage-body { min-height: 360px; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .mini-wrap { aspect-ratio: 16 / 9; }
  .legend { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .intro-grid { grid-template-columns: 1fr; }
  .predict-chip { margin-left: 0; width: 100%; }
  .phase-tabs { overflow-x: auto; }
}

</style>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">R11 · 现实建模 / 幻影堵车</p>
      <h1>幻影堵车</h1>
      <p class="subtitle">没有事故、没有红灯，为什么车流还是会堵？</p>
    </div>
    <button class="ach-trophy-btn" id="openAchievements" type="button">
      <span>🏆 成就</span>
      <strong><span data-ach-count>0</span>/<span data-ach-total>0</span></strong>
    </button>
  </header>

  <main class="layout">
    <aside class="nav panel-shell">
      <h2>实验路径</h2>
      <div class="module-list" id="moduleList"></div>
    </aside>

    <section class="stage panel-shell">
      <div class="objective-bar hidden" id="objectiveBar">
        <span class="obj-icon" id="objIcon">🎯</span>
        <span class="obj-text" id="objText"></span>
        <span class="obj-progress" id="objProgress"></span>
      </div>
      <div class="stage-head">
        <div>
          <h2 id="stageTitle">幻影堵车</h2>
          <p id="stageSubtitle"></p>
        </div>
        <div class="toolbar" id="toolbar"></div>
      </div>
      <div class="stage-body" id="stageBody">
        <canvas id="mainCanvas" aria-label="幻影堵车实验画布"></canvas>
        <div class="html-stage hidden" id="htmlStage"></div>
        <div class="canvas-hint hidden" id="canvasHint"></div>
      </div>
    </section>

    <aside class="data panel-shell">
      <h2>实况读数</h2>
      <div class="metrics" id="metrics"></div>
      <div class="legend" id="legend"></div>
      <div class="mini-chart" id="miniChart">
        <h3 id="miniTitle">迷你图</h3>
        <div class="mini-wrap"><canvas id="miniCanvas"></canvas></div>
      </div>
      <div class="rule-card" id="ruleCard"></div>
      <div class="conclusion">
        <button id="revealToggle" class="btn subtle" type="button">显示结论</button>
        <div class="conclusion-body muted-box hidden" id="conclusionBody"></div>
      </div>
    </aside>

    <footer class="prompt panel-shell">
      <div class="prompt-top">
        <div class="phase-tabs" id="phaseTabs">
          <button type="button" data-phase="observe" class="active">观察</button>
          <button type="button" data-phase="verify">验证</button>
          <button type="button" data-phase="prove">证明</button>
        </div>
        <div class="predict-chip hidden" id="predictChip"></div>
      </div>
      <p id="promptText"></p>
    </footer>
  </main>

  <div class="modal-bg" id="achievementModal" role="dialog" aria-labelledby="achievementTitle">
    <div class="modal">
      <div class="modal-head">
        <h2 id="achievementTitle">发现成就</h2>
        <button class="icon-btn" id="closeAchievements" type="button" aria-label="关闭">✕</button>
      </div>
      <div class="ach-progress-track"><span data-ach-progress></span></div>
      <div class="ach-list" id="achievementList"></div>
      <div class="modal-actions">
        <button class="btn subtle" id="resetAchievements" type="button">清空成就</button>
      </div>
    </div>
  </div>

  <script>
(function (root, factory) {
  const api = factory();
  if (typeof module === 'object' && module.exports) module.exports = api;
  root.NaSchEngine = api;
})(typeof globalThis !== 'undefined' ? globalThis : this, function () {
  'use strict';

  // Nagel–Schreckenberg 单车道环形元胞自动机引擎。
  // 道路用 Int8Array 表示：-1 = 空格，0..vmax = 该格上车辆的当前速度。
  // 复用「模式 8 网格引擎底座」：纯函数 / 规则层可单测 / 浏览器与 Node 双用。

  const EMPTY = -1;

  function clamp01(value) {
    if (!Number.isFinite(value)) return 0;
    return Math.max(0, Math.min(1, value));
  }

  // mulberry32：与 SIR 引擎同款种子化伪随机数，保证对比 / 基本图可复现。
  function makeRng(seed) {
    let x = seed >>> 0;
    return function rng() {
      x += 0x6D2B79F5;
      let t = x;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function createRoad(length) {
    const road = new Int8Array(Math.max(1, length | 0));
    road.fill(EMPTY);
    return road;
  }

  function cloneRoad(road) {
    return Int8Array.from(road);
  }

  function countCars(road) {
    let n = 0;
    for (let i = 0; i < road.length; i++) if (road[i] >= 0) n += 1;
    return n;
  }

  function density(road) {
    return road.length ? countCars(road) / road.length : 0;
  }

  // 升序返回所有车辆所在格子下标。
  function carPositions(road) {
    const out = [];
    for (let i = 0; i < road.length; i++) if (road[i] >= 0) out.push(i);
    return out;
  }

  // 第 k 辆车（positions 升序）到前方下一辆车之间的空格数（环形）。
  // 只有一辆车时返回 L-1（可绕行除自身外的所有格子）。
  function gapAhead(length, positions, k) {
    const n = positions.length;
    if (n === 0) return 0;
    const here = positions[k];
    const next = positions[(k + 1) % n];
    return ((next - here - 1) % length + length) % length;
  }

  // 按密度随机布车（Fisher–Yates 部分洗牌取互不相同的位置）。返回实际车数。
  function placeByDensity(road, targetDensity, rng = Math.random, initialV = 0) {
    const L = road.length;
    road.fill(EMPTY);
    const target = Math.round(clamp01(targetDensity) * L);
    const idx = new Array(L);
    for (let i = 0; i < L; i++) idx[i] = i;
    for (let i = 0; i < target; i++) {
      const j = i + Math.floor(rng() * (L - i));
      const tmp = idx[i]; idx[i] = idx[j]; idx[j] = tmp;
    }
    const v = Math.max(0, initialV | 0);
    for (let i = 0; i < target; i++) road[idx[i]] = v;
    return target;
  }

  // 均匀布车（确定性演示用）。返回实际车数。
  function placeEvenly(road, count, initialV = 0) {
    const L = road.length;
    road.fill(EMPTY);
    const n = Math.max(0, Math.min(L, count | 0));
    const v = Math.max(0, initialV | 0);
    for (let i = 0; i < n; i++) {
      road[Math.floor((i * L) / n)] = v;
    }
    return n;
  }

  // 一个时间步：对每辆车并行套用 NaSch 四规则。
  // 1) 加速 v=min(v+1,vmax)  2) 看前方间距减速 v=min(v,gap)
  // 3) 概率 p 随机点刹 v=max(v-1,0)  4) 前进 x=(x+v) mod L
  function stepNasch(options) {
    const {
      road,
      vmax,
      p,
      rng = Math.random,
      obstacle = -1,   // 可选：一个临时「障碍 / 抛锚车 / 红灯」格，车不能驶入或越过它（M4 用）
    } = options;
    const L = road.length;
    const vMax = Math.max(0, vmax | 0);
    const brakeP = clamp01(p);
    const positions = carPositions(road);
    const n = positions.length;
    const next = createRoad(L);

    // 把障碍当作一个「虚拟阻挡物」插进有序阻挡序列，只影响前方间距，不移动、不计入车数。
    const hasObs = obstacle >= 0 && obstacle < L && road[obstacle] < 0;
    let blockers = positions;
    if (hasObs) {
      blockers = positions.slice();
      let lo = 0;
      while (lo < blockers.length && blockers[lo] < obstacle) lo += 1;
      blockers.splice(lo, 0, -obstacle - 1); // 负数编码障碍：真实位置 = -code-1
    }
    const nb = blockers.length;

    let moved = 0;
    let jamCars = 0;
    let braked = 0;

    for (let k = 0; k < nb; k++) {
      const code = blockers[k];
      if (code < 0) continue; // 障碍本身：不动、不应用规则、不计数
      const pos = code;
      let v = road[pos];
      // 1. 加速
      if (v < vMax) v += 1;
      // 2. 看前方间距减速（前方阻挡物可能是车，也可能是障碍）
      const nextCode = blockers[(k + 1) % nb];
      const nextPos = nextCode < 0 ? (-nextCode - 1) : nextCode;
      const g = ((nextPos - pos - 1) % L + L) % L;
      if (v > g) v = g;
      // 3. 随机点刹
      if (v > 0 && rng() < brakeP) {
        v -= 1;
        braked += 1;
      }
      // 4. 前进
      const np = (pos + v) % L;
      next[np] = v;
      moved += v;
      if (v === 0) jamCars += 1;
    }

    return {
      road: next,
      moved,
      flow: L ? moved / L : 0,      // q = (Σv)/L = ρ·v̄，每格每步通过的车量
      meanV: n ? moved / n : 0,     // 平均车速
      jamCars,                      // 本步速度为 0 的车数（堵住）
      braked,                       // 本步触发随机点刹的车数
      cars: n,
    };
  }

  // 把指定车辆速度强制清零，模拟「点一脚刹车」的扰动（M4）。返回是否命中车辆。
  function brakeCar(road, position) {
    if (position < 0 || position >= road.length) return false;
    if (road[position] < 0) return false;
    road[position] = 0;
    return true;
  }

  // 扫不同密度，各自跑到稳态后测平均流量，得到基本图数据点（M3）。
  function sweepFundamental(options) {
    const {
      length,
      vmax,
      p,
      densities,
      warmup = 200,
      measure = 200,
      seed = 12345,
    } = options;
    const out = [];
    for (const d of densities) {
      const road = createRoad(length);
      const rng = makeRng(seed + Math.round(d * 100000));
      placeByDensity(road, d, rng);
      let cur = road;
      for (let t = 0; t < warmup; t++) {
        cur = stepNasch({ road: cur, vmax, p, rng }).road;
      }
      let sumFlow = 0;
      for (let t = 0; t < measure; t++) {
        const r = stepNasch({ road: cur, vmax, p, rng });
        sumFlow += r.flow;
        cur = r.road;
      }
      out.push({ density: d, flow: measure ? sumFlow / measure : 0 });
    }
    return out;
  }

  return {
    EMPTY,
    makeRng,
    clamp01,
    createRoad,
    cloneRoad,
    countCars,
    density,
    carPositions,
    gapAhead,
    placeByDensity,
    placeEvenly,
    stepNasch,
    brakeCar,
    sweepFundamental,
  };
});

  <script>
/*
 * achievements.js —— 交互课件「成就/激励系统」代码底座
 * ---------------------------------------------------------------
 * 来源：从成品 lights-out.html / polyomino-tiling.html 的成就系统提炼。
 * 特性：零依赖、原生 JS、可直接 file:// 打开、可整段内联进单 HTML。
 * 用法与设计说明见：references/patterns-library.md →「成就系统底座」。
 *
 * 设计要点（务必照做）：
 *  - 成就奖励「发现 / 掌握」里程碑，不奖励「点击次数」。
 *  - 声明式成就表 + check(state) 谓词；状态变更后调用 ach.check(state) 即可。
 *  - localStorage 持久化（带版本号 key），刷新后进度保留。
 *  - 解锁即 toast；可选奖杯弹窗 + 进度条。
 * ---------------------------------------------------------------
 */
(function (global) {
  'use strict';

  /**
   * @param {Object}   options
   * @param {Array}    options.defs            成就定义：{ id, icon, name, desc, check?(state)=>bool }
   * @param {string}   options.storageKey      localStorage key，建议带版本号，如 'lights-out-ach-v1'
   * @param {number}  [options.toastDuration]  toast 停留毫秒，默认 4200
   * @param {Function}[options.onUnlock]       每解锁一项的回调 (def) => void（可选，用于撒花/音效）
   */
  function createAchievements(options) {
    options = options || {};
    var defs = options.defs || [];
    var storageKey = options.storageKey || 'courseware-achievements-v1';
    var toastDuration = options.toastDuration || 4200;
    var onUnlock = typeof options.onUnlock === 'function' ? options.onUnlock : null;

    var unlocked = new Set();

    function findDef(id) {
      for (var i = 0; i < defs.length; i++) { if (defs[i].id === id) return defs[i]; }
      return null;
    }
    function load() {
      try {
        var raw = global.localStorage.getItem(storageKey);
        if (raw) JSON.parse(raw).forEach(function (id) { unlocked.add(id); });
      } catch (e) { /* 隐私模式 / file:// 受限时静默降级 */ }
    }
    function save() {
      try { global.localStorage.setItem(storageKey, JSON.stringify(Array.from(unlocked))); }
      catch (e) { /* 静默降级：本次会话仍可用，只是不持久 */ }
    }

    // ---- toast（懒创建容器，无需在 HTML 里预置） ----
    function toastStack() {
      var el = document.getElementById('achToastStack');
      if (!el) {
        el = document.createElement('div');
        el.id = 'achToastStack';
        el.className = 'ach-toast-stack';
        document.body.appendChild(el);
      }
      return el;
    }
    function showToast(def) {
      var el = document.createElement('div');
      el.className = 'ach-toast';
      el.innerHTML =
        '<div class="ach-toast-title"><span>🏆</span>解锁成就</div>' +
        '<div class="ach-toast-name">' + (def.icon || '') + ' ' + def.name + '</div>' +
        '<div class="ach-toast-desc">' + (def.desc || '') + '</div>';
      toastStack().appendChild(el);
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, toastDuration);
    }

    // ---- 进度反馈（按 data 属性自动挂载，无则跳过） ----
    function updateProgress() {
      var got = count(), tot = Math.max(1, total());
      var bar = document.querySelector('[data-ach-progress]');
      if (bar) bar.style.width = Math.round(got / tot * 100) + '%';
      var c = document.querySelector('[data-ach-count]'); if (c) c.textContent = count();
      var t = document.querySelector('[data-ach-total]'); if (t) t.textContent = total();
    }

    function fire(def) {
      save();
      showToast(def);
      updateProgress();
      if (onUnlock) onUnlock(def);
    }

    // 命令式解锁：用于「做了某动作就解锁」的离散事件
    function unlock(id) {
      if (unlocked.has(id)) return false;
      var def = findDef(id);
      if (!def) return false;
      unlocked.add(id);
      fire(def);
      return true;
    }

    // 声明式解锁：传入当前 state，自动解锁所有 check(state) 为真者
    function check(state) {
      var fresh = [];
      for (var i = 0; i < defs.length; i++) {
        var def = defs[i];
        if (def.check && !unlocked.has(def.id) && def.check(state)) {
          unlocked.add(def.id);
          fresh.push(def);
        }
      }
      if (fresh.length) { fresh.forEach(fire); }
      return fresh;
    }

    function has(id) { return unlocked.has(id); }
    function count() { return defs.filter(function (d) { return unlocked.has(d.id); }).length; }
    function total() { return defs.length; }
    function reset() { unlocked.clear(); save(); updateProgress(); }

    // 可选：把成就清单渲染进某个容器（用于奖杯弹窗）
    function renderList(container) {
      if (!container) return;
      container.innerHTML = '';
      defs.forEach(function (def) {
        var got = unlocked.has(def.id);
        var row = document.createElement('div');
        row.className = 'ach-row' + (got ? ' is-unlocked' : '');
        row.innerHTML =
          '<div class="ach-icon">' + (got ? (def.icon || '🏆') : '🔒') + '</div>' +
          '<div class="ach-meta"><div class="ach-name">' + def.name + '</div>' +
          '<div class="ach-desc">' + (def.desc || '') + '</div></div>' +
          '<div class="ach-status">' + (got ? '✓ 已解锁' : '未解锁') + '</div>';
        container.appendChild(row);
      });
      updateProgress();
    }

    load();
    updateProgress();

    return {
      check: check,        // 声明式：状态变更后调用 ach.check(state)
      unlock: unlock,      // 命令式：离散事件触发 ach.unlock(id)
      has: has,
      count: count,
      total: total,
      reset: reset,
      renderList: renderList
    };
  }

  global.createAchievements = createAchievements;
  if (typeof module !== 'undefined' && module.exports) { module.exports = { createAchievements: createAchievements }; }
})(typeof window !== 'undefined' ? window : this);

  function fit(canvas) {

    const rect = canvas.getBoundingClientRect();

    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx, w, h };

  // ---------- 模块控制器 ----------
  const controllers = {};

  // 通用模拟体
  function newSim({ length, vmax, p, density, seed }) {
    const sim = { length, vmax, p, density, seed, generation: 0, road: null, rng: null, flowHist: [], jamHist: [], lastFlow: 0, lastMeanV: 0, jamCars: 0, cars: 0 };
    resetSim(sim);
    return sim;
  }
  function resetSim(sim, initialV) {
    sim.rng = E.makeRng(sim.seed);
    sim.road = E.createRoad(sim.length);
    E.placeByDensity(sim.road, sim.density, E.makeRng(sim.seed + 1), initialV || 0);
    sim.generation = 0;
    sim.flowHist = [];
    sim.jamHist = [];
    sim.lastFlow = 0; sim.lastMeanV = 0; sim.jamCars = 0;
    sim.cars = E.countCars(sim.road);
  }
  function advance(sim) {
    const r = E.stepNasch({ road: sim.road, vmax: sim.vmax, p: sim.p, rng: sim.rng });
    sim.road = r.road;
    sim.generation += 1;
    sim.lastFlow = r.flow; sim.lastMeanV = r.meanV; sim.jamCars = r.jamCars; sim.cars = r.cars;
    sim.flowHist.push(r.flow); if (sim.flowHist.length > 400) sim.flowHist.shift();
    sim.jamHist.push(r.jamCars); if (sim.jamHist.length > 400) sim.jamHist.shift();
    if (!flags.everRan) { flags.everRan = true; }
    return r;
  }

  // 折线/柱状迷你图
  function drawSparkline(stage, data, opts) {
    const { ctx, w, h } = stage;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#fbfdfe'; ctx.fillRect(0, 0, w, h);
    const padL = 30, padR = 8, padT = 10, padB = 18;
    const plotW = w - padL - padR, plotH = h - padT - padB;
    const maxY = Math.max(opts.maxY || 0.01, ...data, 0.01);
    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + plotH); ctx.lineTo(padL + plotW, padT + plotH); ctx.stroke();
    ctx.fillStyle = '#94a3b8'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'right';
    ctx.fillText(fmt2(maxY), padL - 3, padT + 8);
    ctx.fillText('0', padL - 3, padT + plotH);
    ctx.textAlign = 'center';
    ctx.fillText(opts.xLabel || '时间 →', padL + plotW / 2, h - 4);
    if (data.length > 1) {
      ctx.strokeStyle = opts.color || '#3b82f6'; ctx.lineWidth = 1.6; ctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = padL + (i / (data.length - 1)) * plotW;
        const y = padT + plotH - (Math.min(data[i], maxY) / maxY) * plotH;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    if (opts.curLabel) {
      ctx.fillStyle = '#475569'; ctx.textAlign = 'left'; ctx.font = '11px Segoe UI';
      ctx.fillText(opts.curLabel, padL + 4, padT + 12);
    }
  }

  // 路面横条（迷你/M4 顶条）
  function drawRoadStrip(ctx, x0, y0, w, h, road, vmax) {
    ctx.fillStyle = '#eef4f5'; ctx.fillRect(x0, y0, w, h);
    const L = road.length; const cw = w / L;
    for (let i = 0; i < L; i++) {
      const v = road[i]; if (v < 0) continue;
      ctx.fillStyle = speedColor(v, vmax);
      ctx.fillRect(x0 + i * cw, y0, Math.max(1.2, cw), h);
    }
  }

  // 时空图
  function drawTimeSpace(ctx, x0, y0, w, h, rows, L, maxRows, vmax) {
    ctx.fillStyle = '#fbfdfe'; ctx.fillRect(x0, y0, w, h);
    const cw = w / L, ch = h / maxRows;
    for (let y = 0; y < rows.length; y++) {
      const row = rows[y]; const py = y0 + y * ch;
      for (let x = 0; x < L; x++) {
        const v = row[x]; if (v < 0) continue;
        ctx.fillStyle = speedColor(v, vmax);
        ctx.fillRect(x0 + x * cw, py, Math.max(1, cw), Math.max(1, ch));
      }
    }
  }

        return { w: rect.width, h: rect.height };

      htmlStage.innerHTML = `
        <div class="intro-grid">
          <div class="intro-card"><h3>📏 临界密度</h3><p>低于它扰动被吸收、车流畅通；高于它任何小扰动都会被放大成持续堵车。来自 M1。</p><span class="tag">实验①</span></div>
          <div class="intro-card"><h3>↩️ 逆行波</h3><p>车往前开，堵车波却往后退；斜率 = Δ位置÷Δ时间 = 波速（负）。来自 M2。</p><span class="tag">实验②</span></div>
          <div class="intro-card"><h3>📈 基本图</h3><p>q = ρ×v̄，先升后降；峰值密度让吞吐量最大。来自 M3。</p><span class="tag">实验③</span></div>
          <div class="intro-card"><h3>💥 点刹连锁</h3><p>越过门槛后，单独一脚刹车就足以引爆自我维持的堵车波。来自 M4。</p><span class="tag">实验④</span></div>
        </div>
        <h3 style="margin:16px 0 8px;font-size:15px;">🌍 把堵车波带回现实</h3>
        <div class="intro-grid">
          <div class="transfer-card"><h3>🛣️ 高速幻影堵车</h3><p>车流密度一高，一个变道或点刹就会被后车层层放大——你被堵在原地，前面其实啥也没有。</p><span class="tag">同一套临界密度</span></div>
          <div class="transfer-card"><h3>🚇 地铁发车间隔</h3><p>发车太密（高密度）一旦一班晚点，延误会像堵车波一样向后累积；留足间隔=留在临界密度以下。</p><span class="tag">间距=安全</span></div>
          <div class="transfer-card"><h3>🌐 网络拥塞</h3><p>数据包太多、缓冲太满，丢包重传被放大成拥塞崩溃；拥塞控制就是把"密度"压回临界线下。</p><span class="tag">涌现同源</span></div>
        </div>
        <h3 style="margin:16px 0 8px;font-size:15px;">📝 闯关小测</h3>
        <div id="quizWrap"></div>`;
      this.buildQuiz();
    },
    buildQuiz() {
      const QUIZ = [
        { q: '幻影堵车（没有事故）最根本的原因是：', opts: ['有人乱开车', '车流密度越过了临界值', '路面质量差'], a: 1 },
        { q: '在时空图上，堵车波的斜带通常：', opts: ['顺着车流向前倾', '逆着车流向后倾', '完全水平'], a: 1 },
        { q: '流量-密度基本图的形状是：', opts: ['一直上升', '先升后降，有个峰值', '一直下降'], a: 1 },
        { q: '车流量 q 和密度 ρ、平均车速 v̄ 的关系是：', opts: ['q = ρ + v̄', 'q = ρ × v̄', 'q = ρ ÷ v̄'], a: 1 },
        { q: '要让一条路单位时间通过最多的车，应该把密度调到：', opts: ['越大越好', '越小越好', '基本图峰值对应的临界密度'], a: 2 },
      ];
      const wrap = $('#quizWrap'); let done = 0;
      wrap.innerHTML = QUIZ.map((item, i) => `
        <div class="quiz-card" data-qi="${i}">
          <p><b>${i + 1}.</b> ${item.q}</p>
          <div class="quiz-opts">${item.opts.map((o, j) => `<button class="quiz-opt" data-i="${i}" data-j="${j}">${o}</button>`).join('')}</div>
          <div class="quiz-feedback" id="qf${i}"></div>
        </div>`).join('');
      wrap.querySelectorAll('.quiz-opt').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = +btn.dataset.i, j = +btn.dataset.j; const card = wrap.querySelector(`.quiz-card[data-qi="${i}"]`);
          if (card.dataset.answered) return;
          const correct = QUIZ[i].a;
          card.querySelectorAll('.quiz-opt').forEach(b => {
            if (+b.dataset.j === correct) b.classList.add('correct');
            else if (b === btn) b.classList.add('wrong');
          });
          card.dataset.answered = '1';
          $('#qf' + i).textContent = j === correct ? '✓ 答对了！' : '正确答案已高亮，对照实验再想想。';
          done += 1;
          if (done >= QUIZ.length && !flags.quizDone) { flags.quizDone = true; syncAch(); $('#qf' + (QUIZ.length - 1)).textContent += ' 🎓 完成闯关，解锁「学成出师」！'; }
        });
      });
    },
    onFrame() {},
    resize() {},
  };

  // ---------- 模块切换 ----------
  function enterModule(id) {
    app.active = id; app.running = false; app.phase = 'observe';
    phaseTabs.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.phase === 'observe'));
    const m = MODULES.find(x => x.id === id);
    stageTitleEl.textContent = m.title;
    stageSubtitleEl.textContent = m.subtitle;
    miniChartEl.style.display = m.usesMini ? '' : 'none';
    conclusionBody.classList.add('hidden'); revealToggle.textContent = '显示结论';
    refreshNav();
    controllers[id].enter();
    setPrompt();
    // 同步 fit（读取 getBoundingClientRect 会强制布局，无需等 rAF；headless 更稳）
    if (m.usesCanvas) { mainStage = fit(mainCanvas); }
    if (m.usesMini) { miniStage = fit(miniCanvas); }
    const c = controllers[id];
    if (c.resize) c.resize();
  }

  // ---------- 画布点击路由 ----------
  function canvasPoint(evt) {
    const rect = mainCanvas.getBoundingClientRect();
    const t = evt.touches && evt.touches[0] ? evt.touches[0] : evt;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  mainCanvas.addEventListener('click', (e) => {
    const c = controllers[app.active];
    if (c && c.onCanvasClick) { const p = canvasPoint(e); c.onCanvasClick(p.x, p.y); }
  });

  // ---------- 成就弹窗 ----------
  $('#openAchievements').addEventListener('click', () => { ach.renderList($('#achievementList')); $('#achievementModal').classList.add('open'); });
  $('#closeAchievements').addEventListener('click', () => $('#achievementModal').classList.remove('open'));
  $('#achievementModal').addEventListener('click', (e) => { if (e.target.id === 'achievementModal') e.target.classList.remove('open'); });
  $('#resetAchievements').addEventListener('click', () => { ach.reset(); refreshNav(); ach.renderList($('#achievementList')); });

  // ---------- 主循环 ----------
  function loop(now) {
    const c = controllers[app.active];
    if (c && c.onFrame) c.onFrame(now);
    requestAnimationFrame(loop);
  }

  // ---------- 启动 ----------
  function buildNav() {
    moduleListEl.innerHTML = MODULES.map(m =>
      `<button class="module-card" type="button" data-id="${m.id}"><strong>${m.label}</strong><span>${m.short}</span></button>`).join('');
    moduleListEl.querySelectorAll('.module-card').forEach(card => {
      card.addEventListener('click', () => enterModule(card.dataset.id));
    });
  }

  function init() {
    ach = createAchievements({ storageKey: 'phantom-jam-ach-v1', defs: ACH_DEFS, onUnlock: () => refreshNav() });
    buildNav();
    enterModule('intro');
    requestAnimationFrame(loop);
    window.addEventListener('resize', () => {
      const m = MODULES.find(x => x.id === app.active);
      if (m.usesCanvas) mainStage = fit(mainCanvas);
      if (m.usesMini) miniStage = fit(miniCanvas);
      const c = controllers[app.active];
      if (c && c.resize) c.resize();
    });
    // 暴露给自测
    window.__pj = { app, flags, controllers, enterModule, syncAch, ach: () => ach };
  }

  init();
})();

</script>
</body>
</html>
