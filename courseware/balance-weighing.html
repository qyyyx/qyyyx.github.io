<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天平称重问题 v2</title>
  <style>
    :root {
      --bg:#f4f7f8; --surface:#fff; --surface-strong:#eef4f5; --line:#d7e1e3;
      --text:#152529; --muted:#66777d; --accent:#3b82f6; --accent-dark:#2563eb;
      --accent-soft:#dbeafe; --gold:#f4c542; --good:#16a34a; --bad:#dc2626;
      --warn:#c47a1c; --shadow:0 12px 28px rgba(21,37,41,.08);
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; overflow-x:hidden; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; letter-spacing:0; }
    button,input { font:inherit; }
    button { touch-action:manipulation; }
    .app { min-height:100vh; display:grid; grid-template-rows:auto 1fr auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:18px; padding:16px 20px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.92); position:sticky; top:0; z-index:20; }
    .brand { min-width:0; }
    .brand h1 { margin:0; font-size:24px; line-height:1.2; }
    .brand p { margin:4px 0 0; color:var(--muted); line-height:1.45; font-size:13px; }
    .progress-pill { min-height:40px; display:inline-flex; align-items:center; gap:10px; padding:8px 12px; border:1px solid var(--line); border-radius:999px; background:var(--surface); color:var(--muted); white-space:nowrap; box-shadow:0 4px 14px rgba(21,37,41,.06); }
    .progress-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 5px var(--accent-soft); }
    .workspace { display:grid; grid-template-columns:220px minmax(0,1fr) 320px; gap:16px; padding:16px; align-items:start; min-width:0; }
    .workspace.no-data { grid-template-columns:220px minmax(0,1fr); }
    .workspace.no-data .data { display:none; }
    .panel,.nav,.prompt { background:var(--surface); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); }
    .nav { padding:12px; position:sticky; top:88px; }
    .nav h2,.data h2 { margin:0 0 10px; font-size:16px; }
    .nav button { width:100%; min-height:44px; margin:0 0 7px; border:1px solid transparent; border-radius:8px; background:transparent; color:var(--text); text-align:left; padding:8px 10px; cursor:pointer; }
    .nav button.active { background:var(--accent-soft); border-color:#bfdbfe; color:var(--accent-dark); font-weight:700; }
    .stage,.data { padding:18px; min-width:0; }
    .stage-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .stage-head h2 { margin:0; font-size:24px; line-height:1.25; }
    .stage-head p { margin:6px 0 0; color:var(--muted); line-height:1.6; }
    .badge { display:inline-flex; align-items:center; justify-content:center; min-height:30px; padding:4px 10px; border-radius:999px; background:var(--accent-soft); color:var(--accent-dark); font-size:12px; font-weight:700; white-space:nowrap; }
    .badge.good { color:#166534; background:#dcfce7; }
    .muted { color:var(--muted); line-height:1.5; }
    .story-card,.visual-card,.data-card,.next-card,.mini-scene,.control-card,.answer-card { border:1px solid var(--line); border-radius:8px; background:#fff; }
    .intro-hero { display:grid; grid-template-columns:minmax(0,1.08fr) minmax(280px,.92fr); gap:16px; align-items:stretch; }
    .story-card { padding:16px; line-height:1.72; }
    .story-card p { margin:0 0 12px; }
    .story-card strong { color:var(--accent-dark); }
    .visual-card { min-height:260px; padding:16px; display:grid; place-items:center; overflow:hidden; background:radial-gradient(circle at 20% 20%,rgba(59,130,246,.12),transparent 28%),linear-gradient(180deg,#fff,#f8fbff); }
    .scale-illustration,.challenge-scale { width:min(100%,460px); height:240px; position:relative; margin:auto; }
    .scale-beam,.challenge-beam { position:absolute; left:10%; right:10%; top:66px; height:10px; border-radius:999px; background:var(--accent-dark); transform-origin:center; transition:transform .45s ease; }
    .scale-beam { transform:rotate(-3deg); }
    .scale-stand,.challenge-stand { position:absolute; left:50%; top:70px; width:10px; height:135px; border-radius:999px; background:var(--accent); transform:translateX(-50%); }
    .scale-base,.challenge-base { position:absolute; left:35%; right:35%; bottom:20px; height:12px; border-radius:999px; background:var(--accent-dark); }
    .scale-pan,.drop-pan { position:absolute; top:108px; width:142px; min-height:66px; border:2px solid #b8c8ce; border-bottom-width:8px; border-radius:10px 10px 22px 22px; background:rgba(255,255,255,.94); display:flex; justify-content:center; align-items:center; align-content:center; flex-wrap:wrap; gap:6px; transition:transform .45s ease,border-color .2s,background .2s; }
    .scale-pan.left,.drop-pan.left { left:3%; }
    .scale-pan.right,.drop-pan.right { right:3%; }
    .scale-pan.left { transform:translateY(13px); }
    .scale-pan.right { transform:translateY(-9px); }
    .rope,.challenge-rope { position:absolute; top:72px; width:2px; height:42px; background:#8ea2aa; transition:transform .45s ease; }
    .rope.left-a,.challenge-rope.left-a { left:15%; } .rope.left-b,.challenge-rope.left-b { left:35%; } .rope.right-a,.challenge-rope.right-a { right:15%; } .rope.right-b,.challenge-rope.right-b { right:35%; }
    .ball,.coin { width:34px; height:34px; border-radius:50%; border:1px solid #d4a62a; background:radial-gradient(circle at 32% 28%,rgba(255,255,255,.9),transparent 22%),linear-gradient(145deg,#ffe08a,var(--gold)); display:inline-grid; place-items:center; font-weight:800; color:#6f4f00; box-shadow:inset 0 -4px 0 rgba(110,79,0,.12); user-select:none; }
    .coin { cursor:grab; position:relative; }
    .coin:active { cursor:grabbing; }
    .coin.selected { outline:3px solid var(--accent); outline-offset:2px; }
    .coin.tiny { width:30px; height:30px; font-size:13px; }
    .challenge-scale.leftHeavy .challenge-beam { transform:rotate(-5deg); }
    .challenge-scale.rightHeavy .challenge-beam { transform:rotate(5deg); }
    .challenge-scale.balance .challenge-beam { transform:rotate(0); }
    .challenge-scale.leftHeavy .drop-pan.left { transform:translateY(16px); border-color:#93c5fd; }
    .challenge-scale.leftHeavy .drop-pan.right { transform:translateY(-10px); }
    .challenge-scale.rightHeavy .drop-pan.left { transform:translateY(-10px); }
    .challenge-scale.rightHeavy .drop-pan.right { transform:translateY(16px); border-color:#fbbf24; }
    .challenge-scale.balance .drop-pan { transform:translateY(0); }
    .drop-pan.drag-over,.pool.drag-over { border-color:var(--accent); background:#eff6ff; }
    .intro-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-top:14px; }
    .mini-scene { padding:14px; min-height:170px; display:grid; grid-template-rows:auto 1fr auto; gap:10px; }
    .mini-scene h3 { margin:0; font-size:16px; }
    .mini-scene p { margin:0; color:var(--muted); line-height:1.55; font-size:13px; }
    .ball-row,.coin-row,.answer-grid { display:flex; flex-wrap:wrap; gap:7px; align-content:center; align-items:center; }
    .result-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:6px; align-items:center; }
    .result-token { min-height:40px; border-radius:8px; background:var(--surface-strong); display:grid; place-items:center; font-weight:700; color:var(--text); font-size:13px; }
    .data-stack { display:grid; gap:10px; }
    .data-card { padding:13px; }
    .data-card strong { display:block; font-size:22px; margin-bottom:4px; }
    .data-card p { margin:0; color:var(--muted); line-height:1.5; font-size:13px; }
    .next-card,.control-card,.answer-card { margin-top:14px; padding:14px; }
    .next-card,.control-row { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; }
    .next-card p { margin:0; color:var(--muted); line-height:1.5; }
    .btn { min-height:42px; border-radius:8px; border:1px solid var(--accent); background:var(--accent); color:#fff; padding:0 14px; cursor:pointer; font-weight:700; }
    .btn:disabled { opacity:.65; cursor:default; }
    .btn.secondary { border-color:var(--line); background:var(--surface); color:var(--text); }
    .btn.good { border-color:var(--good); background:var(--good); }
    .btn.warn { border-color:var(--warn); background:#fff7ed; color:#9a580e; }
    .level-strip { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
    .level-btn { min-height:36px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:0 10px; cursor:pointer; }
    .level-btn.active { border-color:var(--accent); background:var(--accent); color:#fff; font-weight:700; }
    .custom-form { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .custom-form input { width:88px; min-height:40px; border:1px solid var(--line); border-radius:8px; padding:0 10px; }
    .pool { min-height:90px; border:1px dashed #b8c8ce; border-radius:8px; background:#fbfdff; padding:10px; margin-top:12px; }
    .pool-title { display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:13px; margin-bottom:8px; }
    .answer-card h3,.control-card h3 { margin:0 0 10px; font-size:16px; }
    .answer-btn { border:1px solid var(--line); background:#fff; border-radius:999px; padding:4px; cursor:pointer; }
    .answer-btn.selected { border-color:var(--accent); background:var(--accent-soft); }
    .feedback { margin-top:12px; padding:12px; border-radius:8px; border:1px solid var(--line); background:#fff; color:var(--muted); line-height:1.5; }
    .feedback.good { border-color:#bbf7d0; background:#f0fdf4; color:#166534; }
    .feedback.bad { border-color:#fecaca; background:#fef2f2; color:#991b1b; }
    .record { display:grid; gap:8px; }
    .record-row { padding:9px; border:1px solid var(--line); border-radius:8px; background:#fff; font-size:13px; line-height:1.45; }
    .summary-grid { display:grid; grid-template-columns:minmax(0,1.05fr) minmax(280px,.95fr); gap:14px; align-items:stretch; }
    .rule-strip { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-top:14px; }
    .rule-card,.formula-card,.conclusion-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; }
    .rule-card strong { display:block; font-size:24px; color:var(--accent-dark); margin-bottom:6px; }
    .rule-card p,.formula-card p,.conclusion-card p { margin:0; color:var(--muted); line-height:1.55; }
    .recurrence-board { border:1px solid var(--line); border-radius:8px; background:linear-gradient(180deg,#fff,#f8fbff); padding:14px; display:grid; gap:10px; }
    .recurrence-step { display:grid; grid-template-columns:82px minmax(0,1fr) 84px; gap:10px; align-items:center; padding:10px; border-radius:8px; background:#fff; border:1px solid var(--line); }
    .recurrence-step strong { color:var(--accent-dark); }
    .branch-tags { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:6px; }
    .branch-tags span { min-height:34px; display:grid; place-items:center; border-radius:8px; background:var(--surface-strong); font-size:13px; font-weight:700; }
    .formula-card { margin-top:14px; background:#f8fbff; }
    .formula { font-size:24px; font-weight:800; color:var(--accent-dark); margin-bottom:6px; }
    .level-table { width:100%; border-collapse:collapse; overflow:hidden; border-radius:8px; background:#fff; border:1px solid var(--line); }
    .level-table th,.level-table td { padding:10px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
    .level-table th { background:var(--surface-strong); font-size:13px; }
    .level-table tr:last-child td { border-bottom:0; }
    .conclusion-card { margin-top:14px; border-color:#bfdbfe; background:#eff6ff; }
    .conclusion-card h3 { margin:0 0 8px; font-size:17px; }
    .state-list { display:grid; gap:7px; max-height:330px; overflow:auto; padding-right:2px; }
    .state-row { display:grid; grid-template-columns:34px 1fr 1fr; gap:6px; align-items:center; padding:7px; border:1px solid var(--line); border-radius:8px; background:#fff; }
    .state-row.off { opacity:.52; }
    .state-name { font-weight:800; color:var(--text); }
    .state-token { min-height:28px; display:grid; place-items:center; border-radius:999px; font-size:12px; font-weight:800; border:1px solid transparent; }
    .state-token.heavy { color:#1d4ed8; background:#dbeafe; border-color:#bfdbfe; }
    .state-token.light { color:#9a3412; background:#ffedd5; border-color:#fed7aa; }
    .state-token.off { color:#94a3b8; background:#f1f5f9; border-color:#e2e8f0; }
    .state-note { margin-top:8px; color:var(--muted); font-size:13px; line-height:1.5; }
    .compare-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:14px; }
    .compare-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; }
    .compare-card h3 { margin:0 0 8px; font-size:17px; color:var(--accent-dark); }
    .compare-card p { margin:0; color:var(--muted); line-height:1.55; }
    .state-equation { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; margin-top:12px; }
    .state-box { border:1px solid var(--line); border-radius:8px; background:#fff; padding:12px; text-align:center; }
    .state-box strong { display:block; color:var(--accent-dark); font-size:22px; margin-bottom:4px; }
    .state-arrow { color:var(--accent-dark); font-weight:900; font-size:22px; }
    .prompt { margin:0 16px 16px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .prompt strong { display:block; margin-bottom:3px; }
    .prompt p { margin:0; color:var(--muted); line-height:1.5; }
    .toast { position:fixed; right:16px; bottom:16px; width:min(320px,calc(100vw - 32px)); border-radius:8px; border:1px solid var(--line); border-left:4px solid var(--accent); background:#fff; box-shadow:var(--shadow); padding:12px 14px; display:none; z-index:40; }
    .toast.show { display:block; animation:toast-in .2s ease; }
    .toast strong { display:block; margin-bottom:4px; } .toast span { color:var(--muted); font-size:13px; }
    @keyframes toast-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @media (max-width:1120px) { .workspace,.workspace.no-data { grid-template-columns:1fr; } .nav { position:static; display:flex; overflow-x:auto; gap:8px; } .nav h2 { display:none; } .nav button { flex:0 0 150px; margin:0; } }
    @media (max-width:760px) { .topbar { align-items:flex-start; flex-direction:column; } .progress-pill { width:100%; justify-content:center; } .workspace { padding:10px; gap:10px; } .stage,.data { padding:13px; } .stage-head { flex-direction:column; } .intro-hero,.intro-grid,.summary-grid,.rule-strip,.compare-grid { grid-template-columns:1fr; } .visual-card { min-height:210px; } .scale-illustration,.challenge-scale { height:210px; } .scale-pan,.drop-pan { width:112px; } .recurrence-step,.state-equation { grid-template-columns:1fr; } .state-arrow { transform:rotate(90deg); } .control-row { align-items:stretch; flex-direction:column; } .custom-form input { width:100%; } .btn { width:100%; } .prompt { margin:0 10px 10px; align-items:flex-start; flex-direction:column; } .level-strip { flex-wrap:nowrap; overflow-x:auto; padding-bottom:4px; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar"><div class="brand"><h1>天平称重问题</h1><p>新版课件 v2：先认识问题，再用闯关发现三分法和候选状态递推。</p></div><div class="progress-pill" aria-label="当前进度"><span class="progress-dot"></span><span id="progressText"></span></div></header>
    <main class="workspace"><nav class="nav" id="nav" aria-label="模块导航"></nav><section class="stage panel" id="stage" aria-live="polite"></section><aside class="data panel" id="data"></aside></main>
    <section class="prompt" id="prompt"></section>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"><strong></strong><span></span></div>
  <script>
    (function(){
      "use strict";
      var labels="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
      var levels=[3,6,7,8,9,10,12];
      var modules=["M0 问题介绍","M1 已知轻重探究","M2 三分法总结","M3 不知轻重探究","M4 12 球挑战","M5 不知轻重总结"];
      var app={module:0,knownSummaryOpen:false,unknownSummaryOpen:false,known:{levelIndex:0,count:3,custom:false,direction:"light",secret:0,placements:[],records:[],last:"balance",guess:null,solved:false,feedback:""},unknown:{levelIndex:0,count:3,custom:false,direction:"light",secret:0,placements:[],records:[],last:"balance",guess:null,solved:false,feedback:""},challenge:{count:12,direction:"light",secret:0,placements:[],records:[],last:"balance",guess:null,solved:false,feedback:"",suggestion:""}};
      function coinName(i){return labels[i]||String(i+1)}
      function minKnown(n){var steps=0,capacity=1;while(capacity<n){steps++;capacity*=3}return steps}
      function randomInt(n){return Math.floor(Math.random()*n)}
      function resetKnown(count,custom){app.known.count=count;app.known.custom=!!custom;app.known.direction=Math.random()<.5?"light":"heavy";app.known.secret=randomInt(count);app.known.placements=Array(count).fill("pool");app.known.records=[];app.known.last="balance";app.known.guess=null;app.known.solved=false;app.known.feedback=""}
      function outcomeText(o){return o==="leftHeavy"?"左盘重":o==="rightHeavy"?"右盘重":"平衡"}
      function sideText(dir){return dir==="light"?"伪币偏轻":"伪币偏重"}
      function showToast(title,msg){var t=document.getElementById("toast");t.querySelector("strong").textContent=title;t.querySelector("span").textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3200)}
      function render(){renderNav();var workspace=document.querySelector(".workspace");if(workspace)workspace.classList.toggle("no-data",app.module===5);document.getElementById("progressText").textContent="M"+app.module+" / 6 · "+modules[app.module].replace(/^M\d\s*/,""); if(app.module===0)renderM0(); else if(app.module===1)renderM1(); else if(app.module===2)renderM2(); else if(app.module===3)renderM3(); else if(app.module===4)renderM4(); else if(app.module===5)renderM5(); else renderLocked();}
      function renderNav(){document.getElementById("nav").innerHTML='<h2>学习路径</h2>'+modules.map(function(m,i){var cls=i===app.module?'active':'';return '<button type="button" class="'+cls+'" data-module="'+i+'">'+m+'</button>'}).join("")}
      function renderM0(){document.getElementById("stage").innerHTML='<div class="stage-head"><div><h2>M0：先认识“天平称重问题”</h2><p>你看到的是一排外观完全相同的小球，其中只有一个重量异常。不能用手掂，只能用天平。怎样用尽量少的称量次数找到它？</p></div><span class="badge">图文导入</span></div><div class="intro-hero"><article class="story-card"><p><strong>这类问题很古老，也很现代。</strong>古老之处在于它常以金币、砝码、珍珠、药丸的故事出现；现代之处在于它其实是在训练“用一次测试排除尽量多的可能”。</p><p>天平每次只告诉我们三件事之一：左边重、右边重、或者平衡。厉害的策略，不是碰运气，而是让每一种结果都能继续缩小范围。</p><p>接下来你会先挑战“已知伪币偏轻或偏重”的关卡，发现三分法；再进入“不知道伪币轻重”的关卡，观察为什么三分法不能直接照搬。</p></article><div class="visual-card"><div class="scale-illustration"><div class="scale-beam"></div><div class="scale-stand"></div><div class="scale-base"></div><div class="rope left-a"></div><div class="rope left-b"></div><div class="rope right-a"></div><div class="rope right-b"></div><div class="scale-pan left"><span class="ball">A</span><span class="ball">B</span></div><div class="scale-pan right"><span class="ball">C</span></div></div></div></div><div class="intro-grid"><div class="mini-scene"><h3>1. 外观相同</h3><div class="ball-row"><span class="ball">A</span><span class="ball">B</span><span class="ball">C</span><span class="ball">D</span><span class="ball">E</span></div><p>眼睛看不出来，必须设计称量。</p></div><div class="mini-scene"><h3>2. 只有一个异常</h3><div class="ball-row"><span class="ball">?</span><span class="ball">?</span><span class="ball">?</span><span class="ball">?</span></div><p>目标不是称出重量，而是定位唯一的伪币。</p></div><div class="mini-scene"><h3>3. 一次三种结果</h3><div class="result-row"><span class="result-token">左重</span><span class="result-token">平衡</span><span class="result-token">右重</span></div><p>三种结果，是三分法与决策树的起点。</p></div></div><div class="next-card"><p>准备好了，就进入 M1：已知轻重探究。下一模块加入真正的拖拽天平和闯关提交。</p><button class="btn" data-action="go-m1" type="button">进入 M1 已知轻重探究</button></div>';document.getElementById("data").innerHTML='<h2>数据看板</h2><div class="data-stack"><div class="data-card"><strong>1 个</strong><p>整组球里只有一个重量异常。</p></div><div class="data-card"><strong>3 类</strong><p>一次称重只可能得到左重、右重、平衡。</p></div><div class="data-card"><strong>2 条主线</strong><p>先研究已知轻重，再研究不知轻重。</p></div><div class="data-card"><strong>下一步</strong><p>M1 会从 3、6、7、8、9、10、12 个球的关卡开始。</p></div></div>';document.getElementById("prompt").innerHTML='<div><strong>探究提示</strong><p>先想一想：如果天平只有三种结果，为什么它可能比“一个一个试”更快？</p></div><button class="btn secondary" data-action="go-m1" type="button">进入 M1</button>'}
      function renderM1(){var k=app.known, left=zoneCoins("left"), right=zoneCoins("right"), pool=zoneCoins("pool"), status=k.solved?'<span class="badge good">本关已通关</span>':'<span class="badge">'+sideText(k.direction)+'</span>';document.getElementById("stage").innerHTML='<div class="stage-head"><div><h2>M1：已知轻重探究</h2><p>本关已经告诉你伪币是偏轻还是偏重。拖动小球到天平两侧，称重后选择你认为的伪币并提交。</p></div>'+status+'</div><div class="level-strip">'+levels.map(function(n,i){return '<button class="level-btn '+(!k.custom&&i===k.levelIndex?'active':'')+'" data-level="'+i+'" type="button">'+n+' 球</button>'}).join("")+'</div><div class="control-card"><div class="control-row"><div class="custom-form"><label>自定义数量 <input id="customCount" type="number" min="3" max="27" value="'+k.count+'"></label><button class="btn secondary" data-action="custom-known" type="button">重制自定义关卡</button></div><button class="btn warn" data-action="reset-known" type="button">重制本关</button></div></div><div class="challenge-scale '+k.last+'"><div class="challenge-beam"></div><div class="challenge-stand"></div><div class="challenge-base"></div><div class="challenge-rope left-a"></div><div class="challenge-rope left-b"></div><div class="challenge-rope right-a"></div><div class="challenge-rope right-b"></div><div class="drop-pan left" data-drop="left" aria-label="左盘">'+left+'</div><div class="drop-pan right" data-drop="right" aria-label="右盘">'+right+'</div></div><div class="pool" data-drop="pool"><div class="pool-title"><span>球池：拖到左右盘；移动端可点击小球循环位置</span><span>'+poolCount()+' 个未称</span></div><div class="coin-row">'+pool+'</div></div><div class="control-card"><div class="control-row"><button class="btn" data-action="weigh-known" type="button">称重</button><button class="btn secondary" data-action="clear-scale" type="button">清空天平</button></div></div><div class="answer-card"><h3>提交伪币</h3><div class="answer-grid">'+answerButtons()+'</div><div class="control-row" style="margin-top:12px"><button class="btn good" data-action="submit-known" type="button" '+(k.solved?'disabled':'')+'>提交伪币</button>'+(k.solved?'<button class="btn" data-action="next-known" type="button">进入下一关</button><button class="btn secondary" data-action="go-m2" type="button">归纳三分法</button>':'')+'</div>'+feedbackHtml()+'</div>';document.getElementById("data").innerHTML=dataM1();document.getElementById("prompt").innerHTML='<div><strong>探究提示</strong><p>已知伪币'+(k.direction==="light"?'偏轻':'偏重')+'：如果天平不平衡，哪一边会把嫌疑范围缩小？试着控制每次称量后的最坏情况。</p></div><button class="btn secondary" data-action="reset-known" type="button">重制本关</button>';attachDnD()}
      function zoneCoins(zone){return app.known.placements.map(function(p,i){return p===zone?coinHtml(i):""}).join("")}

      function dataM1(){var k=app.known;return '<h2>数据看板</h2><div class="data-stack"><div class="data-card"><strong>'+sideText(k.direction)+'</strong><p>已知轻重条件已经给出，先利用这个信息。</p></div><div class="data-card"><strong>'+minKnown(k.count)+' 次</strong><p>理论最少称量次数：ceil(log₃ n)。</p></div><div class="data-card"><strong>'+k.records.length+' 次</strong><p>已称量次数。最近结果：'+(k.records.length?outcomeText(k.records[k.records.length-1].outcome):'尚未称量')+'。</p></div><div class="data-card"><strong>'+(k.guess==null?'未选择':coinName(k.guess))+'</strong><p>当前提交候选。</p></div><div class="data-card"><strong>称量记录</strong><div class="record">'+(k.records.length?k.records.map(function(r,idx){return '<div class="record-row">第 '+(idx+1)+' 次：'+r.left+' vs '+r.right+'<br>结果：'+outcomeText(r.outcome)+'</div>'}).join(""):'<p>还没有称量。左右盘数量相等后点击“称重”。</p>')+'</div></div></div>'}
      function renderM2(){var reveal=app.knownSummaryOpen;document.getElementById("stage").innerHTML='<div class="stage-head"><div><h2>M2：已知轻重总结——三分法</h2><p>把 M1 的闯关经验整理成规律：已知伪币偏轻或偏重时，每一次称量最多把可能性分成三类。</p></div><span class="badge">归纳整理</span></div><div class="summary-grid"><article class="story-card"><p><strong>为什么是“三分”？</strong>因为天平一次只会给出三种互斥结果：左重、平衡、右重。已知伪币偏轻或偏重时，每一种结果都能直接指向一组球。</p><p>好的策略会让三种结果后剩下的嫌疑球数尽量接近。这样最坏情况也不会太大，称量次数才会少。</p><div class="rule-strip"><div class="rule-card"><strong>1 次</strong><p>最多区分 3 个球。</p></div><div class="rule-card"><strong>2 次</strong><p>每一类再分 3 类，最多 9 个球。</p></div><div class="rule-card"><strong>3 次</strong><p>继续递推，最多 27 个球。</p></div></div></article><div class="recurrence-board"><div class="recurrence-step"><strong>第一次</strong><div class="branch-tags"><span>左重</span><span>平衡</span><span>右重</span></div><b>3 类</b></div><div class="recurrence-step"><strong>第二次</strong><div class="branch-tags"><span>3 类</span><span>3 类</span><span>3 类</span></div><b>9 类</b></div><div class="recurrence-step"><strong>第三次</strong><div class="branch-tags"><span>9 类</span><span>9 类</span><span>9 类</span></div><b>27 类</b></div><div class="formula-card"><div class="formula">k 次最多处理 3^k 个</div><p>所以 n 个球最少需要的次数，是第一个满足 3^k ≥ n 的整数 k。</p></div></div></div><div class="next-card"><p>先看上面的递推图，再自己解释：为什么 6、7、8、9 球都是 2 次，而 10、12 球变成 3 次？</p><button class="btn" data-action="toggle-known-summary" type="button">'+(reveal?'隐藏结论':'揭示结论')+'</button></div>'+(reveal?'<div class="conclusion-card"><h3>已知轻重的核心结论</h3><p>已知伪币偏轻或偏重时，一次称量有 3 种结果；如果每次都把嫌疑球尽量平均分到三种结果中，k 次最多处理 3^k 个球。因此最少称量次数是满足 3^k ≥ n 的最小整数 k，也就是 ceil(log₃ n)。</p></div>':'');document.getElementById("data").innerHTML=dataM2();document.getElementById("prompt").innerHTML='<div><strong>探究提示</strong><p>三分法不是“随便分三堆”，而是让三种称量结果都能继续排除，并尽量让最坏分支最小。</p></div>'}
      function dataM2(){var rows=[1,2,3,4,"n"].map(function(k){var max=k==="n"?"3^n":Math.pow(3,k),note=k==="n"?"最多处理 1 到 3^n 个球。":"最多处理 1 到 "+max+" 个球。";return '<tr><td>'+k+' 次</td><td>'+max+' 个球</td><td>'+note+'</td></tr>'}).join("");return '<h2>数据看板</h2><div class="data-stack"><div class="data-card"><strong>3 种</strong><p>每次称量只有左重、平衡、右重三种结果。</p></div><div class="data-card"><strong>3^k</strong><p>k 次称量最多覆盖的球数。</p></div><div class="data-card"><strong>ceil(log₃ n)</strong><p>已知轻重条件下的最少称量次数。</p></div><div class="data-card"><strong>次数-最多球数</strong><table class="level-table"><thead><tr><th>称量次数</th><th>最多球数</th><th>说明</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'}
      function resetUnknown(count,custom){app.unknown.count=count;app.unknown.custom=!!custom;app.unknown.direction=Math.random()<.5?"light":"heavy";app.unknown.secret=randomInt(count);app.unknown.placements=Array(count).fill("pool");app.unknown.records=[];app.unknown.last="balance";app.unknown.guess=null;app.unknown.solved=false;app.unknown.feedback=""}
      function renderM3(){var u=app.unknown,left=unknownZoneCoins("left"),right=unknownZoneCoins("right"),pool=unknownZoneCoins("pool"),states=unknownCandidates(),coinCount=unknownCandidateCoinCount(states),status=u.solved?'<span class="badge good">本关已通关</span>':'<span class="badge">轻重未知</span>';document.getElementById("stage").innerHTML='<div class="stage-head"><div><h2>M3：不知轻重探究</h2><p>本关不告诉你伪币偏轻还是偏重。你只需要提交哪一个球是伪币；右侧会把每个球的“可能偏重/可能偏轻”状态列出来。</p></div>'+status+'</div><div class="level-strip">'+levels.map(function(n,i){return '<button class="level-btn '+(!u.custom&&i===u.levelIndex?'active':'')+'" data-ulevel="'+i+'" type="button">'+n+' 球</button>'}).join("")+'</div><div class="control-card"><div class="control-row"><div class="custom-form"><label>自定义数量 <input id="unknownCustomCount" type="number" min="3" max="12" value="'+u.count+'"></label><button class="btn secondary" data-action="custom-unknown" type="button">重制自定义关卡</button></div><button class="btn warn" data-action="reset-unknown" type="button">重制本关</button></div></div><div class="control-card"><h3>状态空间提醒</h3><p class="muted">开始时不是 '+u.count+' 个可能，而是 '+(2*u.count)+' 个候选状态：每个球都可能偏重，也可能偏轻。称量之后，保留下来的也是状态集合。</p></div><div class="challenge-scale '+u.last+'"><div class="challenge-beam"></div><div class="challenge-stand"></div><div class="challenge-base"></div><div class="challenge-rope left-a"></div><div class="challenge-rope left-b"></div><div class="challenge-rope right-a"></div><div class="challenge-rope right-b"></div><div class="drop-pan left" data-udrop="left" aria-label="左盘">'+left+'</div><div class="drop-pan right" data-udrop="right" aria-label="右盘">'+right+'</div></div><div class="pool" data-udrop="pool"><div class="pool-title"><span>球池：拖到左右盘；移动端可点击小球循环位置</span><span>'+unknownPoolCount()+' 个未称</span></div><div class="coin-row">'+pool+'</div></div><div class="control-card"><div class="control-row"><button class="btn" data-action="weigh-unknown" type="button">称重</button><button class="btn secondary" data-action="clear-unknown" type="button">清空天平</button></div></div><div class="answer-card"><h3>提交伪币</h3><p class="muted">只选球号，不需要判断偏轻或偏重。</p><div class="answer-grid">'+unknownAnswerButtons()+'</div><div class="control-row" style="margin-top:12px"><button class="btn good" data-action="submit-unknown" type="button" '+(u.solved?'disabled':'')+'>提交伪币</button>'+(u.solved?'<button class="btn" data-action="next-unknown" type="button">进入下一关</button>':'')+'</div>'+unknownFeedbackHtml()+'</div>';document.getElementById("data").innerHTML=dataM3(states,coinCount);document.getElementById("prompt").innerHTML='<div><strong>探究提示</strong><p>不知轻重时，第一次不平衡通常有两种解释：左边可能有偏重球，也可能右边有偏轻球。看右侧状态表怎样变化。</p></div><button class="btn secondary" data-action="reset-unknown" type="button">重制本关</button>';attachUnknownDnD()}
      function unknownZoneCoins(zone){return app.unknown.placements.map(function(p,i){return p===zone?unknownCoinHtml(i):""}).join("")}
      function unknownCoinHtml(i){var sel=app.unknown.guess===i?' selected':'';return '<button class="coin'+sel+'" draggable="true" data-ucoin="'+i+'" title="拖拽放置；点击循环位置">'+coinName(i)+'</button>'}
      function unknownAnswerButtons(){return Array.from({length:app.unknown.count},function(_,i){return '<button class="answer-btn '+(app.unknown.guess===i?'selected':'')+'" data-uguess="'+i+'" type="button"><span class="coin tiny">'+coinName(i)+'</span></button>'}).join("")}

      function unknownFeedbackHtml(){var f=app.unknown.feedback;if(!f)return '<div class="feedback">每关只有一次提交机会。答错会自动重制；答对说明你找到了真正的伪币。</div>';return '<div class="feedback '+(app.unknown.solved?'good':'bad')+'">'+f+'</div>'}
      function outcomeForState(coin,kind,left,right){var delta=kind==="heavy"?1:-1,score=0;if(left.indexOf(coin)>=0)score+=delta;if(right.indexOf(coin)>=0)score-=delta;return score>0?"leftHeavy":score<0?"rightHeavy":"balance"}

      function dataM3(states,coinCount){var u=app.unknown,total=2*u.count,latest=u.records.length?outcomeText(u.records[u.records.length-1].outcome):'尚未称量',note=u.records.length?'每次称量都在过滤“球+轻重”的候选状态。':'初始每个球都有偏重、偏轻两种候选状态。';return '<h2>数据看板</h2><div class="data-stack"><div class="data-card"><strong>'+states.length+' / '+total+'</strong><p>剩余候选状态。'+note+'</p></div><div class="data-card"><strong>'+coinCount+' / '+u.count+'</strong><p>仍可能是伪币的球数。最终只需把球数缩到 1。</p></div><div class="data-card"><strong>'+u.records.length+' 次</strong><p>已称量次数。最近结果：'+latest+'。</p></div><div class="data-card"><strong>'+(u.guess==null?'未选择':coinName(u.guess))+'</strong><p>当前提交候选。</p></div><div class="data-card"><strong>候选状态提示</strong>'+candidateStateList(states)+'<p class="state-note">蓝色表示可能偏重，橙色表示可能偏轻，灰色表示该状态已被排除。</p></div><div class="data-card"><strong>称量记录</strong><div class="record">'+(u.records.length?u.records.map(function(r,idx){return '<div class="record-row">第 '+(idx+1)+' 次：'+r.leftText+' vs '+r.rightText+'<br>结果：'+outcomeText(r.outcome)+'</div>'}).join(""):'<p>还没有称量。左右盘数量相等后点击“称重”。</p>')+'</div></div></div>'}

      function renderM5(){var reveal=app.unknownSummaryOpen;document.getElementById("stage").innerHTML='<div class="stage-head"><div><h2>M5：不知轻重总结</h2><p>把 M3 和 M4 的发现收束成一句话：不知轻重时，策略分的不是球堆，而是“球号 + 偏重/偏轻”的候选状态。</p></div><span class="badge">状态递推</span></div><div class="summary-grid"><article class="story-card"><p><strong>为什么不能直接照搬三分法？</strong>已知轻重时，球 A 只代表一个可能；不知轻重时，球 A 同时代表“A 偏重”和“A 偏轻”两个状态。</p><p>所以一次不平衡不是简单告诉你“哪一组球有问题”。例如左盘重，可能是左边某球偏重，也可能是右边某球偏轻。真正被保留下来的是一组状态。</p><div class="compare-grid"><div class="compare-card"><h3>已知轻重</h3><p>候选对象是球。称量结果直接指向某一组球，因此可以把球尽量三分。</p></div><div class="compare-card"><h3>不知轻重</h3><p>候选对象是状态。每个球有偏重、偏轻两种状态，因此要把状态集合尽量三分。</p></div></div></article><div class="recurrence-board"><div class="formula-card"><div class="formula">12 球：24 个候选状态</div><p>每个球都有“偏重/偏轻”两种可能，所以 12 个球一开始是 24 个状态。</p></div><div class="state-equation"><div class="state-box"><strong>4 vs 4</strong><span>第一称</span></div><div class="state-arrow">→</div><div class="state-box"><strong>8 / 8 / 8</strong><span>三种结果后的状态数</span></div></div><div class="recurrence-step"><strong>平衡</strong><div class="branch-tags"><span>未称 4 球</span><span>偏重</span><span>偏轻</span></div><b>8 状态</b></div><div class="recurrence-step"><strong>左重</strong><div class="branch-tags"><span>左 4 偏重</span><span>或</span><span>右 4 偏轻</span></div><b>8 状态</b></div><div class="recurrence-step"><strong>右重</strong><div class="branch-tags"><span>左 4 偏轻</span><span>或</span><span>右 4 偏重</span></div><b>8 状态</b></div></div></div><div class="rule-strip"><div class="rule-card"><strong>决策树</strong><p>每次称量都是一次三分分支，目标是让最坏分支尽量小。</p></div><div class="rule-card"><strong>状态空间</strong><p>不只数球，还要数每个球的偏重、偏轻状态。</p></div><div class="rule-card"><strong>最坏情况</strong><p>好策略不是靠运气，而是保证任何结果都能继续推进。</p></div></div><div class="next-card"><button class="btn" data-action="toggle-unknown-summary" type="button">'+(reveal?'隐藏结论':'揭示结论')+'</button></div>'+(reveal?'<div class="conclusion-card"><h3>不知轻重的核心结论</h3><p>不知轻重时，三分法不能直接按球使用；因为每个球都有“可能偏重”和“可能偏轻”两种状态。正
