<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Open Graph / 微信·群分享卡片 -->

<meta name="twitter:title" content="杨老师的 mathlab">

<style>
  :root{
    --bg:#0f172a; --bg2:#1e293b;
    --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --brand:#4f46e5; --brand2:#7c3aed;
    --geo:#0ea5e9; --alg:#10b981; --num:#f59e0b; --app:#ef4444; --fun:#8b5cf6;
    --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,-apple-system,sans-serif;
    color:var(--ink); background:#f1f5f9; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  /* 顶部 */
  header{
    background:linear-gradient(135deg,var(--bg) 0%,#312e81 60%,var(--brand2) 120%);
    color:#fff; padding:56px 20px 72px; text-align:center; position:relative;
  }
  header h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:.5px}
  header p{margin-top:12px;font-size:clamp(14px,2.5vw,18px);color:#c7d2fe;max-width:680px;margin-left:auto;margin-right:auto}
  header p.motto-en{margin-top:16px;font-style:italic;font-weight:500;color:#a5b4fc;font-size:clamp(13px,2.2vw,17px);letter-spacing:.3px}
  .stat{margin-top:18px;font-size:13px;color:#a5b4fc;letter-spacing:.5px}
  /* 搜索 + 筛选 */
  .toolbar{
    max-width:1080px;margin:-34px auto 0;padding:0 20px;position:relative;z-index:2;
  }
  .search-wrap{position:relative}
  #search{
    width:100%;padding:16px 18px 16px 50px;font-size:16px;border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);outline:none;background:#fff;color:var(--ink);
  }
  #search:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(79,70,229,.15)}
  .search-wrap svg.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  /* 一键清除按钮 */
  #clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:#e2e8f0;color:#475569;
    width:26px;height:26px;border-radius:50%;font-size:16px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center}
  #clear:hover{background:#cbd5e1}
  #clear.show{display:flex}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;justify-content:center}
  .chip{
    border:1px solid var(--line);background:#fff;color:var(--muted);font-family:inherit;
    padding:7px 16px;border-radius:999px;font-size:14px;cursor:pointer;transition:.15s;user-select:none;
  }
  .chip:hover{border-color:var(--brand);color:var(--brand)}
  .chip.active{background:var(--brand);border-color:var(--brand);color:#fff}
  .chip:focus-visible{outline:3px solid rgba(79,70,229,.4);outline-offset:2px}
  /* 内容 */
  main{max-width:1080px;margin:0 auto;padding:40px 20px 80px}
  .category{margin-top:44px}
  .category:first-child{margin-top:30px}
  .cat-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .cat-dot{width:12px;height:12px;border-radius:4px}
  .cat-head h2{font-size:22px;font-weight:700}
  .cat-head .count{font-size:13px;color:var(--muted);background:#fff;border:1px solid var(--line);padding:2px 10px;border-radius:999px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s;
    text-decoration:none;color:inherit;position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--brand))}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(15,23,42,.14)}
  .card .tag{align-self:flex-start;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;color:#fff;background:var(--accent,var(--brand));margin-bottom:12px}
  .card .new-badge{position:absolute;top:12px;right:12px;z-index:1;background:#ef4444;color:#fff;font-size:11px;font-weight:700;
    padding:3px 9px;border-radius:999px;letter-spacing:.5px;box-shadow:0 2px 8px rgba(239,68,68,.4)}
  .card h3{font-size:18px;font-weight:700;margin-bottom:8px}
  .card p{font-size:14px;color:var(--muted);flex:1}
  .card .go{margin-top:16px;font-size:14px;font-weight:600;color:var(--accent,var(--brand));display:inline-flex;align-items:center;gap:6px}
  .card .go svg{transition:transform .18s}
  .card:hover .go svg{transform:translateX(4px)}
  .empty{display:none;text-align:center;color:var(--muted);padding:60px 0;font-size:16px}
  /* 回到顶部 */
  #toTop{position:fixed;right:24px;bottom:24px;width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
    background:var(--brand);color:#fff;box-shadow:0 6px 20px rgba(79,70,229,.4);display:flex;align-items:center;justify-content:center;
    opacity:0;visibility:hidden;transform:translateY(10px);transition:.2s;z-index:50}
  #toTop.show{opacity:1;visibility:visible;transform:translateY(0)}
  #toTop:hover{background:var(--brand2)}
  footer{text-align:center;padding:30px 20px 50px;color:var(--muted);font-size:13px;border-top:1px solid var(--line)}
  footer a{color:var(--brand);text-decoration:none}
  /* 站点级账号入口（昵称+班级码，登录态与认知实验课件同源共享） */
  .acctbar{position:fixed;top:14px;right:16px;z-index:40;display:flex;gap:8px;align-items:center;font-size:13px}
  .acctbar .lbl{color:#e0e7ff;background:rgba(0,0,0,.28);padding:7px 12px;border-radius:999px}
  .acctbar button{border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.14);color:#fff;padding:7px 13px;border-radius:999px;font:inherit;font-size:13px;cursor:pointer}
  .acctbar button:hover{background:rgba(255,255,255,.26)}
  .acct-modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .acct-modal{background:#fff;border-radius:16px;max-width:420px;width:100%;padding:22px;box-shadow:var(--shadow)}
  .acct-modal h2{font-size:20px;margin-bottom:4px}
  .acct-modal p{font-size:13px;color:var(--muted);margin-bottom:6px}
  .acct-modal label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px}
  .acct-modal input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px}
  .acct-modal .acts{display:flex;gap:10px;margin-top:16px}
  .acct-modal .acts button{flex:1;padding:11px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer}
  .acct-modal .save{background:var(--brand);color:#fff}
  .acct-modal .cancel{background:#e2e8f0;color:#475569}
</style>
</head>
<body>
<div class="acctbar" id="acctbar">
  <span class="lbl" id="acctLbl">游客</span>
  <button id="acctBtn" type="button">登录 / 注册</button>
</div>
<header>
  <h1>杨老师的 mathlab</h1>
  <p class="motto-en">Math for big questions, math for real questions, math for funny questions.</p>
  <p>希望在这里，你能够感受到数学不仅仅是解题，更有着无数"大问题"、"真实的问题"与"有趣的问题"。数学是一门语言，我们用它绘出星辰大海~</p>
  <div class="stat" id="stat"></div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="search" type="search" placeholder="搜索课件标题、知识点或关键词…" autocomplete="off" aria-label="搜索课件">
    <button id="clear" type="button" aria-label="清除搜索" title="清除（Esc）">×</button>
  </div>
  <div class="filters" id="filters" role="group" aria-label="按主题筛选"></div>
</div>

<main id="main"></main>
<div class="empty" id="empty">没有匹配的课件，换个关键词试试～</div>

<button id="toTop" type="button" aria-label="回到顶部" title="回到顶部">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
</button>

<footer>
  © <span id="year"></span> 杨老师的 mathlab · 由单文件 HTML 课件构建 ·
  <a href="https://github.com/qyyyx/qyyyx.github.io" target="_blank" rel="noopener">GitHub</a>
</footer>

<script>
const CATEGORIES = [
  {key:"geo", name:"几何与图形", color:"var(--geo)"},
  {key:"alg", name:"代数与函数", color:"var(--alg)"},
  {key:"num", name:"数论与组合", color:"var(--num)"},
  {key:"app", name:"应用问题",   color:"var(--app)"},
  {key:"fun", name:"趣味与思维", color:"var(--fun)"},
];

// 字段说明：title 标题 / cat 分类 / file 文件 / desc 简介 / tags 关键词 / isNew 新课件(可选)
const COURSEWARE = [
  // 几何与图形
  {title:"圆柱与圆锥", cat:"geo", file:"cylinder-cone.html",
   desc:"动态展开与切割圆柱、圆锥，直观理解体积与表面积公式的来历。", tags:["立体几何","体积","表面积"]},
  {title:"燕尾模型", cat:"geo", file:"swallowtail-model.html",
   desc:"经典面积模型：通过燕尾定理探究三角形内线段与面积之比。", tags:["面积模型","三角形","比例"]},
  {title:"鸟头模型", cat:"geo", file:"birdhead-model.html",
   desc:"自学探究实验室，拖动顶点感受共角三角形的面积关系。", tags:["面积模型","共角","三角形"]},
  {title:"风筝与蝴蝶模型", cat:"geo", file:"kite-butterfly.html",
   desc:"梯形中的风筝模型与蝴蝶模型，可视化对应线段与面积的转化。", tags:["面积模型","梯形","相似"]},
  {title:"立方体打洞", cat:"geo", file:"drilled-cube-volume.html", isNew:true,
   desc:"在立方体上打洞，三维可视化求剩余体积与表面积的变化。", tags:["立体几何","体积","表面积"]},
  {title:"等高模型", cat:"geo", file:"equal-height-model.html", isNew:true,
   desc:"等高的三角形面积之比等于底之比，交互演示这一经典面积模型。", tags:["面积模型","三角形","等高"]},

  // 代数与函数
  {title:"二次函数", cat:"alg", file:"quadratic-function.html",
   desc:"数学实验室：调节系数实时观察抛物线开口、顶点与对称轴的变化。", tags:["函数","抛物线","参数"]},
  {title:"正反比例图像", cat:"alg", file:"proportion-graphs.html",
   desc:"探究正比例与反比例函数的图像特征及其在生活中的对应关系。", tags:["函数","比例","图像"]},
  {title:"最值原理", cat:"alg", file:"extremum-principle.html",
   desc:"通过交互模型理解最大值与最小值的几何与代数求解思路。", tags:["最值","优化","几何"]},
  {title:"运动图像（S-T 与 V-T 图）", cat:"alg", file:"motion-graphs.html",
   desc:"拖动小车实时生成位移—时间、速度—时间图像，建立图像与运动的联系。", tags:["函数图像","运动","物理"]},

  // 数论与组合
  {title:"费马小定理", cat:"num", file:"fermat-little.html",
   desc:"用项链着色的组合证明，直观感受费马小定理背后的对称之美。", tags:["数论","组合证明","同余"]},
  {title:"关灯游戏", cat:"num", file:"lights-out.html",
   desc:"灯阵里的奇偶与方程：用线性代数破解经典 Lights Out 谜题。", tags:["线性代数","奇偶","谜题"]},
  {title:"多格骨牌铺砖", cat:"num", file:"polyomino-tiling.html",
   desc:"能不能刚好铺满？动手摆放多格骨牌，体会铺砖问题中的染色论证。", tags:["组合","铺砖","染色"]},
  {title:"骑士巡游问题", cat:"num", file:"knights-tour.html",
   desc:"在棋盘上让骑士走遍每一格，探索图论与回溯的奇妙路径。", tags:["图论","回溯","棋盘"]},
  {title:"完全平方数", cat:"num", file:"perfect-squares.html", isNew:true,
   desc:"探究完全平方数的规律与判定，感受平方数背后的数论结构。", tags:["数论","平方数","规律"]},
  {title:"天平称重问题", cat:"num", file:"balance-weighing.html", isNew:true,
   desc:"经典天平问题：在最少次数内找出 N 枚硬币中的次品，体会信息熵与三分思想。", tags:["称重","信息熵","组合","谜题"]},

  // 应用问题
  {title:"经济问题", cat:"app", file:"economics.html",
   desc:"交互实验课件，用数学模型分析利润、成本与定价等经济情境。", tags:["应用","建模","利润"]},

  // 趣味与思维
  {title:"工作记忆训练游戏", cat:"fun", file:"working-memory-game.html", isNew:true,
   desc:"通过记忆广度小游戏训练工作记忆，挑战你的专注与短时记忆容量。", tags:["思维","记忆","游戏"]},
  {title:"测测你的反应有多快！", cat:"fun", file:"reaction-time.html", isNew:true,
   desc:"F1 起跑灯式反应时实验：测反应极限、亲手画出 Hick 对数曲线、登录后上榜与同学比拼。", tags:["反应时","认知","Hick","游戏","榜单"]},
];

const main = document.getElementById("main");
const filtersEl = document.getElementById("filters");
const searchEl = document.getElementById("search");
const clearBtn = document.getElementById("clear");
const emptyEl = document.getElementById("empty");
const statEl = document.getElementById("stat");
const toTop = document.getElementById("toTop");
const catMap = Object.fromEntries(CATEGORIES.map(c => [c.key, c]));

document.getElementById("year").textContent = new Date().getFullYear();

let activeCat = "all";

// 筛选标签（用 button，天然可键盘 Tab / 回车操作）
filtersEl.appendChild(chip("全部", "all", true));
CATEGORIES.forEach(c => filtersEl.appendChild(chip(c.name, c.key, false)));

function chip(label, key, active){
  const el = document.createElement("button");
  el.type = "button";
  el.className = "chip" + (active ? " active" : "");
  el.textContent = label;
  el.dataset.key = key;
  el.setAttribute("aria-pressed", active ? "true" : "false");
  el.addEventListener("click", () => {
    activeCat = key;
    [...filtersEl.children].forEach(c => {
      const on = c.dataset.key === key;
      c.classList.toggle("active", on);
      c.setAttribute("aria-pressed", on ? "true" : "false");
    });
    render();
  });
  return el;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function render(){
  const q = searchEl.value.trim().toLowerCase();
  main.innerHTML = "";
  let total = 0;

  CATEGORIES.forEach(cat => {
    if (activeCat !== "all" && activeCat !== cat.key) return;
    const items = COURSEWARE.filter(c => c.cat === cat.key && matches(c, q));
    if (!items.length) return;
    total += items.length;

    const section = document.createElement("section");
    section.className = "category";
    section.innerHTML =
      `<div class="cat-head">
         <span class="cat-dot" style="background:${cat.color}"></span>
         <h2>${cat.name}</h2>
         <span class="count">${items.length}</span>
       </div>`;
    const grid = document.createElement("div");
    grid.className = "grid";
    items.forEach(c => grid.appendChild(card(c, cat)));
    section.appendChild(grid);
    main.appendChild(section);
  });

  emptyEl.style.display = total ? "none" : "block";
  clearBtn.classList.toggle("show", !!q);
  // 统计文案：搜索时显示结果数，否则显示总览
  statEl.textContent = q
    ? `找到 ${total} 个课件`
    : `共 ${COURSEWARE.length} 个交互课件 · ${CATEGORIES.length} 个主题分类`;
}

function matches(c, q){
  if (!q) return true;
  return (c.title + " " + c.desc + " " + c.tags.join(" ")).toLowerCase().includes(q);
}

function card(c, cat){
  const a = document.createElement("a");
  a.className = "card";
  a.href = "courseware/" + c.file;
  a.target = "_blank";
  a.rel = "noopener";
  a.style.setProperty("--accent", cat.color);

  const newHtml = c.isNew ? `<span class="new-badge">NEW</span>` : "";

  a.innerHTML =
    `${newHtml}
     <span class="tag">${cat.name}</span>
     <h3>${escapeHtml(c.title)}</h3>
     <p>${escapeHtml(c.desc)}</p>
     <span class="go">打开课件
       <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
     </span>`;
  return a;
}

// 搜索：输入即过滤 + 清除按钮 + Esc 清空
searchEl.addEventListener("input", render);
searchEl.addEventListener("keydown", e => { if (e.key === "Escape") clearSearch(); });
clearBtn.addEventListener("click", clearSearch);
function clearSearch(){ searchEl.value = ""; searchEl.focus(); render(); }

// 回到顶部
window.addEventListener("scroll", () => {
  toTop.classList.toggle("show", window.scrollY > window.innerHeight * 0.6);
});
toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

render();
</script>

<!-- 站点级账号：昵称+班级码，写入 localStorage 'rt:profile'（与认知实验课件同源共享登录态） -->
<script>
(function(){
  var KEY='rt:profile';
  function read(){try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;}}
  function write(p){try{localStorage.setItem(KEY,JSON.stringify(p));}catch(e){}}
  var lbl=document.getElementById('acctLbl'), btn=document.getElementById('acctBtn');
  function refresh(){var p=read(); if(p){lbl.textContent=p.nickname+'@'+p.classCode; btn.textContent='切换 / 退出';} else {lbl.textContent='游客'; btn.textContent='登录 / 注册';}}
  function esc(s){return (s||'').replace(/[&<>"']/g,function(m){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);});}
  btn.addEventListener('click',function(){
    var p=read();
    var bg=document.createElement('div'); bg.className='acct-modal-bg';
    bg.innerHTML='<div class="acct-modal"><h2>登录 / 注册</h2>'+
      '<p>仅需昵称 + 班级码（不收集真实姓名 / 手机 / 邮箱）。登录后在「测测你的反应有多快」等认知课件里记录成绩、上榜并与同学比拼。班级码由老师统一发放。</p>'+
      '<label>昵称（2–12 字）</label><input id="amName" maxlength="12" value="'+esc(p?p.nickname:'')+'" placeholder="如：小闪电">'+
      '<label>班级码</label><input id="amClass" maxlength="16" value="'+esc(p?p.classCode:'')+'" placeholder="如：5年2班">'+
      '<div class="acts"><button class="save" id="amSave">保存</button>'+(p?'<button class="cancel" id="amOut">退出登录</button>':'<button class="cancel" id="amCancel">取消</button>')+'</div></div>';
    document.body.appendChild(bg);
    bg.addEventListener('click',function(e){if(e.target===bg)bg.remove();});
    document.getElementById('amSave').addEventListener('click',function(){
      var nm=document.getElementById('amName').value.trim(), cl=document.getElementById('amClass').value.trim();
      if(!nm){document.getElementById('amName').focus();return;}
      var prev=read(); var uid=(prev&&prev.uid)||'u_'+Math.random().toString(36).slice(2,10);
      write({uid:uid,nickname:nm.slice(0,12),classCode:(cl||'未分班').slice(0,16)}); refresh(); bg.remove();
    });
    var out=document.getElementById('amOut'); if(out)out.addEventListener('click',function(){localStorage.removeItem(KEY);refresh();bg.remove();});
    var cc=document.getElementById('amCancel'); if(cc)cc.addEventListener('click',function(){bg.remove();});
  });
  refresh();
})();
</script>
</body>
</html>
